    checkBtn.addEventListener('click', async () => {
        if (!playlistChannels.length) return;
        checkBtn.disabled = true;
        checkBtn.innerText = '⏳ Checking...';
        const channelsToCheck = [...playlistChannels];
        const totalChannels = channelsToCheck.length;
        updateCheckProgress(0, totalChannels);

        try {
            checkProgressText.innerText = 'Checking channels with backend...';
            const backendResults = await checkChannelsViaBackend(channelsToCheck);
            if (backendResults) {
                backendResults.forEach((result, index) => {
                    const channel = channelsToCheck[index];
                    if (!channel) return;
                    applyCheckResult(channel, result);
                    updateCheckProgress(index + 1, totalChannels);
                });
                updateStats();
                filterAndRender();
                if (textEditorPanel.classList.contains('active')) {
                    m3uTextEditor.value = buildM3UContent();
                    textSaveStatus.innerText = 'Statuses updated from backend check';
                }
                checkBtn.disabled = false;
                checkBtn.innerText = '⚡ Check Status';
                updateCheckProgress(totalChannels, totalChannels);
                setTimeout(() => checkProgressPanel.classList.remove('active'), 1200);
                return;
            }
        } catch (err) {
            const backendUrl = checkerBatchApiUrl();
            if (backendUrl) {
                checkProgressText.innerText = `Backend checker unavailable`;
                alert(`The backend checker could not be reached:\n${backendUrl}\n\n${err && err.message ? err.message : err}\n\nNo browser fallback was used because browser CORS can mark online streams as offline.`);
                checkBtn.disabled = false;
                checkBtn.innerText = '⚡ Check Status';
                setTimeout(() => checkProgressPanel.classList.remove('active'), 1800);
                return;
            }
            checkProgressText.innerText = `No backend checker configured; using browser fallback`;
        }

        const concurrency = 12;
        let nextIndex = 0;
        let completed = 0;

        async function checkOneChannel(index) {
            const channel = channelsToCheck[index];
            const currentIndex = playlistChannels.indexOf(channel);
            const badge = currentIndex !== -1 ? document.getElementById(`status-${currentIndex}`) : null;
            if (badge) badge.innerText = 'TRYING';
            try {
                applyCheckResult(channel, {
                    status: await checkStreamUrl(channel.url),
                    latency_ms: 0,
                    error_details: 'Browser fallback check'
                });
            } catch (err) {
                applyCheckResult(channel, {
                    status: 'offline',
                    latency_ms: 0,
                    error_details: err && err.message ? err.message : 'Browser fallback failed'
                });
            }
            updateStats();
            completed++;
            checkBtn.innerText = `⏳ Checking ${completed}/${totalChannels}`;
            updateCheckProgress(completed, totalChannels);
        }

        async function worker() {
            while (nextIndex < totalChannels) {
                const index = nextIndex++;
                await checkOneChannel(index);
            }
        }

        const workerCount = Math.min(concurrency, totalChannels);
        await Promise.all(Array.from({ length: workerCount }, worker));

        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Statuses updated from check';
        }
        checkBtn.disabled = false;
        checkBtn.innerText = '⚡ Check Status';
        updateCheckProgress(totalChannels, totalChannels);
        setTimeout(() => checkProgressPanel.classList.remove('active'), 1200);
    });

    // 7. Sort Engines
    let isSorted = false;
    sortBtn.addEventListener('click', () => {
        if (!isSorted) {
            playlistChannels.sort((a, b) => a.name.localeCompare(b.name));
            sortBtn.innerText = '🔄 Reset Order';
        } else {
            playlistChannels = [...originalOrder];
            sortBtn.innerText = '🔀 Sort A-Z';
        }
        isSorted = !isSorted;
        filterAndRender();
    });

    let autoCategoryOrder = ['Movies', 'News', 'Philippines', 'Entertainment', 'Sports', 'Documentary', 'Kids'];
    const autoCategoryRules = [
        {
            group: 'Philippines',
            terms: [
                'philippines', 'philippine', 'pinoy', 'filipino', 'tagalog', 'kapamilya', 'kapuso',
                'gma', 'gma network', 'gma main channel', 'gtv', 'heart of asia', 'i heart movies', 'hallypop', 'pinoy hits',
                'tv5', 'cignal', 'rptv', 'one ph', 'one news ph', 'one sports',
                'abs-cbn', 'abs cbn', 'a2z', 'a2z channel 11', 'alltv', 'alltv channel 2',
                'ptv', 'people television network', 'congress tv', 'ptv sports', 'radyo pilipinas', 'radyo pilipinas 1', 'ibc', 'ibc 13',
                'beam tv', 'prtv', 'prtv prime media', 'blast sports', 'knowledge channel', 'bilyonaryo', 'bilyonaryo news',
                'solarflix', 'solar sports', 'shop tv',
                'net 25', 'aliw', 'aliw channel', 'dwiz', 'dwiz news tv', 'eagle broadcasting',
                'inc tv', 'untv', 'truth channel', 'light tv', 'hope channel philippines', 'tv maria',
                'rj digitv', 'rjtv29', 'rj tv 29', 'timeless tv', 'rock mnl', 'rock tv of manila', 'smni',
                'anc', 'teleradyo', 'tele radyo', 'dzbb', 'dzrh', 'dzmm', 'cnn philippines',
                'buko', 'cinemo', 'cinema one', 'pbo', 'pinoy box office', 'viva cinema', 'viva tv', 'sari sari', 'sari-sari', 'jeepney tv',
                'myx philippines', 'myx global', 'radio maria', 'ptv4', 'ptv 4', 'oras ng himala', 'mindanow network',
                'metro channel', 'gnn', 'filam tv', 'cltv36', 'cltv 36', 'pba', 'uaap'
            ]
        },
        { group: 'Movies', terms: ['movie', 'movies', 'cinema', 'film', 'hbo', 'cinemax', 'fox movies', 'thrill', 'hits', 'screen'] },
        { group: 'News', terms: ['news', 'cnn', 'bbc', 'cnbc', 'bloomberg', 'al jazeera', 'fox news'] },
        { group: 'Entertainment', terms: ['entertainment', 'variety', 'lifestyle', 'music', 'mtv', 'myx', 'viva', 'comedy', 'drama', 'series', 'reality'] },
        { group: 'Sports', terms: ['sports', 'sport', 'nba', 'nfl', 'mlb', 'ufc', 'wwe', 'boxing', 'fight', 'espn', 'bein', 'premier', 'football', 'soccer', 'tennis', 'golf'] },
        { group: 'Documentary', terms: ['documentary', 'docs', 'history', 'discovery', 'nat geo', 'national geographic', 'animal planet', 'science', 'knowledge'] },
        { group: 'Kids', terms: ['kids', 'kid', 'cartoon', 'nick', 'nickelodeon', 'disney', 'boomerang', 'baby', 'junior', 'pbs kids'] }
    ];

    function normalizeWords(value) {
        return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    }

    function compactWords(value) {
        return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
    }

    function termMatchScore(text, term, fieldWeight = 1) {
        const normalizedText = normalizeWords(text);
        const normalizedTerm = normalizeWords(term);
        if (!normalizedTerm) return 0;

        const paddedText = ` ${normalizedText} `;
        const paddedTerm = ` ${normalizedTerm} `;
        const wordCount = normalizedTerm.split(/\s+/).filter(Boolean).length;
        const specificity = Math.min(30, normalizedTerm.length) + (wordCount * 6);

        if (normalizedText === normalizedTerm) return (140 + specificity) * fieldWeight;
        if (paddedText.includes(paddedTerm)) return (35 + specificity) * fieldWeight;

        const compactText = compactWords(text);
        const compactTerm = compactWords(term);
        if (compactTerm.length >= 6 && compactText.includes(compactTerm)) {
            return (18 + Math.min(18, compactTerm.length)) * fieldWeight;
        }

        return 0;
    }

    function categoryScore(channel, rule) {
        const fields = [
            { text: channel.name, weight: 1.35 },
            { text: channel.group, weight: 0.85 },
            { text: channel.epgId, weight: 0.75 },
            { text: channel.url, weight: 0.35 },
            { text: channel.logo, weight: 0.25 }
        ];

        let score = 0;
        rule.terms.forEach(term => {
            fields.forEach(field => {
                score += termMatchScore(field.text, term, field.weight);
            });
        });

        const existingGroup = normalizeWords(channel.group);
        if (existingGroup === normalizeWords(rule.group)) score += 45;
        return score;
    }

    function normalizeAutoCategory(channel) {
        const scoredRules = autoCategoryRules
            .map(rule => ({ group: rule.group, score: categoryScore(channel, rule) }))
            .sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return autoCategoryRank(a.group) - autoCategoryRank(b.group);
            });

        if (scoredRules[0] && scoredRules[0].score >= 45) return scoredRules[0].group;

        const existingGroup = autoCategoryOrder.find(group => normalizeWords(channel.group) === normalizeWords(group));
        return existingGroup || 'Entertainment';
    }

    function normalizePlaylistGroups() {
        playlistChannels.forEach(ch => {
            ch.group = normalizeAutoCategory(ch);
        });
        sortByCategoryOrder();
        originalOrder = [...playlistChannels];
    }

    function autoCategoryRank(group) {
        const rank = autoCategoryOrder.indexOf(group);
        return rank === -1 ? autoCategoryOrder.length : rank;
    }

    function sortByCategoryOrder() {
        playlistChannels.sort((a, b) => {
            const categoryDiff = compareCategoryNames(a.group, b.group);
            if (categoryDiff !== 0) return categoryDiff;
            return String(a.name || '').localeCompare(String(b.name || ''));
        });
    }

    function populateCategoryOrderSelect() {
        const currentSelection = categoryOrderSelect.value || autoCategoryOrder[0];
        categoryOrderSelect.innerHTML = '';
        autoCategoryOrder.forEach((category, index) => {
            const opt = document.createElement('option');
            opt.value = category;
            opt.innerText = `${index + 1}. ${category}`;
            categoryOrderSelect.appendChild(opt);
        });
        categoryOrderSelect.value = autoCategoryOrder.includes(currentSelection) ? currentSelection : autoCategoryOrder[0];
    }

    function moveSelectedCategory(direction) {
        const selectedCategory = categoryOrderSelect.value;
        const currentIndex = autoCategoryOrder.indexOf(selectedCategory);
        const nextIndex = currentIndex + direction;
        if (currentIndex === -1 || nextIndex < 0 || nextIndex >= autoCategoryOrder.length) return;

        [autoCategoryOrder[currentIndex], autoCategoryOrder[nextIndex]] = [autoCategoryOrder[nextIndex], autoCategoryOrder[currentIndex]];
        sortByCategoryOrder();
        isSorted = false;
        sortBtn.innerText = '🔀 Sort A-Z';
        populateCategoryOrderSelect();
        categoryOrderSelect.value = selectedCategory;
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Text updated from table';
        }
    }

    categoryUpBtn.addEventListener('click', () => moveSelectedCategory(-1));
    categoryDownBtn.addEventListener('click', () => moveSelectedCategory(1));

    autoSortBtn.addEventListener('click', () => {
        playlistChannels.forEach(ch => {
            ch.group = normalizeAutoCategory(ch);
        });

        sortByCategoryOrder();

        isSorted = false;
        sortBtn.innerText = '🔀 Sort A-Z';
        categoryFilter.value = 'all';
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Text updated from table';
        }
    });

    // 8. Auto Category Sorting Filters
    function populateCategories() {
        const currentSelection = categoryFilter.value;
        const categories = getGroupOptions();
        categoryFilter.innerHTML = '<option value="all">All Categories</option>';
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.innerText = cat;
            categoryFilter.appendChild(opt);
        });
        categoryFilter.value = currentSelection === 'all' || categories.includes(currentSelection) ? currentSelection : 'all';
    }

    categoryFilter.addEventListener('change', filterAndRender);
    channelSearchInput.addEventListener('input', filterAndRender);

    function filterAndRender() {
        const selectedCat = categoryFilter.value;
        const query = channelSearchInput.value.trim().toLowerCase();
        const filtered = playlistChannels.filter(ch => {
            const inCategory = selectedCat === 'all' || ch.group === selectedCat;
            if (!inCategory) return false;
            if (!query) return true;
            const searchableText = [
                ch.name,
                ch.group,
                ch.url,
                ch.epgId,
                ch.logo,
                ch.status,
                ...(ch.props || [])
            ].join(' ').toLowerCase();
            return searchableText.includes(query);
        });
        renderTable(filtered);
    }

    // 9. Structured Exporter
    function escapeM3UAttribute(value) {
        return String(value || '').replace(/"/g, '&quot;');
    }

    function buildExtinfLine(ch) {
        const attrs = {
            ...(ch.attrs || {}),
            'tvg-id': ch.epgId || '',
            'tvg-logo': ch.logo || '',
            'group-title': ch.group || 'Entertainment'
        };
        const attrOrder = [...(ch.attrOrder || [])];
        ['tvg-id', 'tvg-logo', 'group-title'].forEach(attr => {
            if (!attrOrder.includes(attr)) attrOrder.push(attr);
        });
        const attrText = attrOrder
            .filter(attr => attrs[attr] !== undefined)
            .map(attr => `${attr}="${escapeM3UAttribute(attrs[attr])}"`)
            .join(' ');
        return `#EXTINF:-1 ${attrText},${ch.name}`;
    }

    function buildM3UContent() {
        let m3uContent = "#EXTM3U\n";
        playlistChannels.forEach(ch => {
            const props = (ch.props || []).map(normalizeLicenseKeyLine);
            const propLines = props.length ? `${props.join('\n')}\n` : '';
            m3uContent += `${buildExtinfLine(ch)}\n${propLines}${ch.url}\n\n`;
        });
        return m3uContent;
    }

    textViewBtn.addEventListener('click', () => {
        m3uTextEditor.value = buildM3UContent();
        textSaveStatus.innerText = 'Text matches table';
        textEditorPanel.classList.add('active');
    });

    m3uTextEditor.addEventListener('input', () => {
        textSaveStatus.innerText = 'Unsaved text changes';
    });

    refreshTextBtn.addEventListener('click', () => {
        m3uTextEditor.value = buildM3UContent();
        textSaveStatus.innerText = 'Text refreshed from table';
    });

    applyTextBtn.addEventListener('click', () => {
        const editedText = m3uTextEditor.value.trim();
        if (!editedText) return alert('Text editor is empty.');
        reloadFromText(editedText);
        m3uTextEditor.value = buildM3UContent();
        textSaveStatus.innerText = 'Saved to table';
    });

    closeTextBtn.addEventListener('click', () => {
        textEditorPanel.classList.remove('active');
    });

    function safePlaylistFileName(name) {
        const clean = String(name || '').trim().replace(/[\\/:*?"<>|]+/g, '_');
        if (/\.(m3u|m3u8)$/i.test(clean)) return clean;
        return `${clean || 'clean_playlist'}.m3u`;
    }

    function downloadM3UContent(m3uContent) {
        const blob = new Blob([m3uContent], { type: 'text/plain' });
        const a = document.createElement('a');
        const objectUrl = URL.createObjectURL(blob);
        a.href = objectUrl;
        a.download = safePlaylistFileName(loadedPlaylistFileName);
        a.click();
        setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
    }

    async function saveM3UContent(m3uContent) {
        if (!window.showSaveFilePicker) {
            downloadM3UContent(m3uContent);
            alert('Your browser used download mode. Use Chrome or Edge on HTTPS to pick and overwrite a file directly.');
            return;
        }

        const handle = await window.showSaveFilePicker({
            suggestedName: safePlaylistFileName(loadedPlaylistFileName),
            types: [{
                description: 'M3U Playlist',
                accept: { 'audio/x-mpegurl': ['.m3u', '.m3u8'], 'text/plain': ['.m3u', '.m3u8'] }
            }]
        });
        const writable = await handle.createWritable();
        await writable.write(m3uContent);
        await writable.close();
        loadedPlaylistFileName = handle.name || loadedPlaylistFileName;
    }

    exportBtn.addEventListener('click', async () => {
        const m3uContent = buildM3UContent();
        exportBtn.disabled = true;
        const previousText = exportBtn.innerText;
        exportBtn.innerText = '💾 Saving...';
        try {
            await saveM3UContent(m3uContent);
            exportBtn.innerText = '✅ Saved';
            setTimeout(() => { exportBtn.innerText = previousText; }, 1400);
        } catch (err) {
            if (err && err.name !== 'AbortError') {
                alert(`Export failed: ${err.message || err}`);
            }
            exportBtn.innerText = previousText;
        } finally {
            exportBtn.disabled = false;
        }
    });

    function enableControls() {
        checkBtn.disabled = false; sortBtn.disabled = false; addChannelBtn.disabled = false; autoSortBtn.disabled = false; autoIconsBtn.disabled = false; deleteDuplicatesBtn.disabled = false; deleteOfflineBtn.disabled = false; deleteGeoblockedBtn.disabled = false;
        categoryOrderSelect.disabled = false; categoryUpBtn.disabled = false; categoryDownBtn.disabled = false;
        categoryFilter.disabled = false; channelSearchInput.disabled = false; textViewBtn.disabled = false; refreshTextBtn.disabled = false; applyTextBtn.disabled = false; exportBtn.disabled = false;
    }

    function updateStats() {
        const statusCounts = playlistChannels.reduce((counts, ch) => {
            const status = ch.status || 'unchecked';
            counts[status] = (counts[status] || 0) + 1;
            return counts;
        }, {});
        statsDisplay.innerText = `Channels: ${playlistChannels.length} | Online: ${statusCounts.online || 0} | Offline: ${statusCounts.offline || 0} | Geoblocked: ${statusCounts.geoblocked || 0} | Unchecked: ${statusCounts.unchecked || 0}`;
    }

    populateCategoryOrderSelect();
</script>
