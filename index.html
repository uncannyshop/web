<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Playlist Studio (Compact)</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #16161a;
            --text-color: #e2e8f0;
            --accent-color: #4f46e5;
            --border-color: #24242b;
            --success: #16a34a;
            --error: #dc2626;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            font-size: 12px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        header h1 { font-size: 16px; margin: 0; }
        header p { margin: 0; color: #94a3b8; font-size: 11px; }

        .controls {
            background-color: var(--card-bg);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        button, input, select {
            background-color: #222227;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #channelSearchInput {
            min-width: 190px;
            cursor: text;
        }

        button:hover { background-color: var(--accent-color); }
        input[type="file"] { display: none; }
        
        .file-label {
            background-color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .toggle-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #cbd5e1;
            cursor: pointer;
            user-select: none;
        }

        .toggle-label input {
            margin: 0;
        }

        .stats {
            margin-left: auto;
            font-weight: bold;
            color: #94a3b8;
        }

        .table-container {
            overflow-x: auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            max-height: 78vh;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 4px 8px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        th {
            background-color: #1e1e24;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
        }

        tr:hover { background-color: #1c1c22; }

        .category-row {
            background: #181820;
            cursor: pointer;
            user-select: none;
        }

        .category-row:hover {
            background: #222232;
        }

        .category-cell {
            padding: 8px 10px;
        }

        .category-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .category-name {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 800;
            color: #f8fafc;
        }

        .category-summary {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 6px;
            color: #94a3b8;
            font-size: 11px;
        }

        .channel-row.collapsed-hidden {
            display: none;
        }

        .channel-logo {
            width: 20px;
            height: 20px;
            object-fit: contain;
            background: #222227;
            border-radius: 2px;
            vertical-align: middle;
        }

        .editable {
            background: transparent;
            border: 1px dashed transparent;
            padding: 2px 4px;
            outline: none;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .editable:focus {
            background: #222227;
            border: 1px solid var(--accent-color);
            border-radius: 2px;
            max-width: none;
            white-space: normal;
        }

        .group-select {
            min-width: 140px;
            max-width: 180px;
            padding: 3px 6px;
        }

        .logo-editor {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-input {
            width: 170px;
            cursor: text;
        }

        .epg-input {
            width: 130px;
            cursor: text;
        }

        .key-input {
            width: 260px;
            cursor: text;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        }

        .checker-api-input {
            min-width: 300px;
            flex: 1 1 300px;
            cursor: text;
        }

        .status-badge {
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            min-width: 55px;
        }

        .status-unchecked { background: #4b5563; }
        .status-online { background: var(--success); }
        .status-offline { background: var(--error); }
        .status-geoblocked { background: #d97706; }

        .btn-danger { 
            background-color: transparent; 
            border: none; 
            padding: 2px 4px;
        }
        .btn-danger:hover { background-color: var(--error); }

        .text-editor-panel {
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 8px;
        }

        .text-editor-panel.active { display: block; }

        .preview-panel {
            display: none;
            position: fixed;
            top: 72px;
            right: 18px;
            width: min(720px, calc(100vw - 36px));
            height: min(460px, calc(100vh - 36px));
            min-width: min(320px, calc(100vw - 20px));
            min-height: 260px;
            max-width: calc(100vw - 20px);
            max-height: calc(100vh - 20px);
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            z-index: 1000;
            resize: both;
            overflow: auto;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
        }

        .preview-panel.active {
            display: flex;
            flex-direction: column;
        }

        .preview-panel.dragging { opacity: 0.96; }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            flex: 0 0 auto;
            cursor: move;
            user-select: none;
            touch-action: none;
        }

        .preview-header > div:first-child {
            min-width: 0;
            overflow: hidden;
        }

        .preview-title {
            font-weight: 700;
            color: #cbd5e1;
        }

        .preview-status {
            color: #94a3b8;
            margin-left: 8px;
            overflow-wrap: anywhere;
        }

        .preview-video {
            width: 100%;
            height: calc(100% - 44px);
            min-height: 180px;
            max-height: none;
            flex: 1 1 auto;
            background: #000;
            border-radius: 4px;
            object-fit: contain;
        }

        #m3uTextEditor {
            width: 100%;
            min-height: 260px;
            box-sizing: border-box;
            background: #101014;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            font-family: Consolas, Monaco, monospace;
            font-size: 12px;
            resize: vertical;
        }

        .text-editor-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
            align-items: center;
        }

        .text-save-status {
            color: #94a3b8;
            margin-right: auto;
        }

        .progress-panel {
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 10px;
        }

        .progress-panel.active { display: block; }

        .progress-row {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .progress-track {
            height: 10px;
            background: #222227;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            transition: width 0.15s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>📺 M3U Playlist Studio</h1>
            <p>Click directly into any cell to edit data instantly.</p>
        </div>
        <div class="stats" id="statsDisplay">Channels: 0</div>
    </header>

    <div class="controls">
        <label class="file-label" for="fileInput">📁 Load File</label>
        <input type="file" id="fileInput" accept=".m3u,.m3u8">
        <label class="file-label" for="mergeFileInput">➕ Merge File</label>
        <input type="file" id="mergeFileInput" accept=".m3u,.m3u8">

        <input type="text" id="urlInput" placeholder="Paste M3U Link URL...">
        <button id="fetchUrlBtn">🌐 Fetch Link</button>
        <button id="mergeUrlBtn">➕ Merge Link</button>

        <button id="addChannelBtn">➕ Add Channel</button>
        <button id="checkBtn" disabled>⚡ Check Status</button>
        <input class="checker-api-input" type="text" id="checkerApiInput" placeholder="Checker API URL (optional)">
        <button id="sortBtn" disabled>🔀 Sort A-Z</button>
        <button id="autoSortBtn" disabled>🧭 Auto Sort Groups</button>
        <button id="autoIconsBtn" disabled>🖼️ Auto Grab Icons</button>
        <button id="deleteDuplicatesBtn" disabled>🧹 Delete Duplicates</button>
        <button id="deleteOfflineBtn" disabled>🗑️ Delete Offline</button>
        <button id="deleteGeoblockedBtn" disabled>🚫 Delete Geoblocked</button>
        <select id="categoryOrderSelect" disabled></select>
        <button id="categoryUpBtn" disabled>↑ Category</button>
        <button id="categoryDownBtn" disabled>↓ Category</button>
        
        <select id="categoryFilter" disabled>
            <option value="all">All Categories</option>
        </select>

        <input type="search" id="channelSearchInput" placeholder="Search channels..." disabled>

        <button id="textViewBtn" disabled>📝 Text View</button>
        <button id="exportBtn" style="background-color: var(--success); margin-left: auto;" disabled>💾 Export M3U</button>
    </div>

    <div class="text-editor-panel" id="textEditorPanel">
        <textarea id="m3uTextEditor" spellcheck="false"></textarea>
        <div class="text-editor-actions">
            <span class="text-save-status" id="textSaveStatus"></span>
            <button id="refreshTextBtn" disabled>↻ Refresh Text</button>
            <button id="applyTextBtn" disabled>💾 Save Text</button>
            <button id="closeTextBtn">Close</button>
        </div>
    </div>

    <div class="progress-panel" id="checkProgressPanel">
        <div class="progress-row">
            <span id="checkProgressText">Checking channels...</span>
            <span id="checkProgressPercent">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="checkProgressFill"></div>
        </div>
    </div>

    <div class="preview-panel" id="previewPanel">
        <div class="preview-header">
            <div>
                <span class="preview-title" id="previewTitle">Preview</span>
                <span class="preview-status" id="previewStatus"></span>
            </div>
            <div>
                <button id="stopPreviewBtn">Stop</button>
                <button id="closePreviewBtn">Close</button>
            </div>
        </div>
        <video class="preview-video" id="previewVideo" controls playsinline></video>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30px;">#</th>
                    <th style="width: 220px;">Logo URL</th>
                    <th>Channel Name</th>
                    <th>Category Group</th>
                    <th>EPG ID</th>
                    <th>Key</th>
                    <th>Stream URL</th>
                    <th style="width: 80px;">Status</th>
                    <th style="width: 40px;">Action</th>
                </tr>
            </thead>
            <tbody id="channelTableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
<script>
    let playlistChannels = [];
    let originalOrder = [];
    const expandedCategories = new Set();
    let loadedPlaylistFileName = 'clean_playlist.m3u';

    // Elements
    const fileInput = document.getElementById('fileInput');
    const mergeFileInput = document.getElementById('mergeFileInput');
    const urlInput = document.getElementById('urlInput');
    const fetchUrlBtn = document.getElementById('fetchUrlBtn');
    const mergeUrlBtn = document.getElementById('mergeUrlBtn');
    const checkBtn = document.getElementById('checkBtn');
    const checkerApiInput = document.getElementById('checkerApiInput');
    const addChannelBtn = document.getElementById('addChannelBtn');
    const sortBtn = document.getElementById('sortBtn');
    const autoSortBtn = document.getElementById('autoSortBtn');
    const autoIconsBtn = document.getElementById('autoIconsBtn');
    const deleteDuplicatesBtn = document.getElementById('deleteDuplicatesBtn');
    const deleteOfflineBtn = document.getElementById('deleteOfflineBtn');
    const deleteGeoblockedBtn = document.getElementById('deleteGeoblockedBtn');
    const categoryOrderSelect = document.getElementById('categoryOrderSelect');
    const categoryUpBtn = document.getElementById('categoryUpBtn');
    const categoryDownBtn = document.getElementById('categoryDownBtn');
    const categoryFilter = document.getElementById('categoryFilter');
    const channelSearchInput = document.getElementById('channelSearchInput');
    const textViewBtn = document.getElementById('textViewBtn');
    const textEditorPanel = document.getElementById('textEditorPanel');
    const m3uTextEditor = document.getElementById('m3uTextEditor');
    const textSaveStatus = document.getElementById('textSaveStatus');
    const refreshTextBtn = document.getElementById('refreshTextBtn');
    const applyTextBtn = document.getElementById('applyTextBtn');
    const closeTextBtn = document.getElementById('closeTextBtn');
    const exportBtn = document.getElementById('exportBtn');
    const tableBody = document.getElementById('channelTableBody');
    const statsDisplay = document.getElementById('statsDisplay');
    const checkProgressPanel = document.getElementById('checkProgressPanel');
    const checkProgressText = document.getElementById('checkProgressText');
    const checkProgressPercent = document.getElementById('checkProgressPercent');
    const checkProgressFill = document.getElementById('checkProgressFill');
    const previewPanel = document.getElementById('previewPanel');
    const previewHeader = previewPanel.querySelector('.preview-header');
    const previewTitle = document.getElementById('previewTitle');
    const previewStatus = document.getElementById('previewStatus');
    const previewVideo = document.getElementById('previewVideo');
    const stopPreviewBtn = document.getElementById('stopPreviewBtn');
    const closePreviewBtn = document.getElementById('closePreviewBtn');
    let previewPlayer = null;
    let previewDrag = null;
    let activePreviewChannel = null;

    function defaultCheckerApiUrl() {
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            return 'http://127.0.0.1:8000/api/check-streams';
        }
        if (location.hostname === 'strong8kdl.xyz') {
            return `${location.origin}/api/check-streams`;
        }
        return 'https://strong8kdl.xyz/api/check-streams';
    }

    checkerApiInput.value = localStorage.getItem('checkerApiUrl') || defaultCheckerApiUrl();
    checkerApiInput.addEventListener('change', () => {
        localStorage.setItem('checkerApiUrl', checkerApiInput.value.trim());
    });

    function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
    }

    function clampPreviewToViewport() {
        if (!previewPanel.classList.contains('active')) return;
        const rect = previewPanel.getBoundingClientRect();
        const left = clamp(rect.left, 10, Math.max(10, window.innerWidth - Math.min(rect.width, window.innerWidth - 20) - 10));
        const top = clamp(rect.top, 10, Math.max(10, window.innerHeight - 48));
        previewPanel.style.left = `${left}px`;
        previewPanel.style.top = `${top}px`;
        previewPanel.style.right = 'auto';
    }

    previewHeader.addEventListener('pointerdown', (event) => {
        if (event.target.closest('button')) return;
        const rect = previewPanel.getBoundingClientRect();
        previewDrag = {
            pointerId: event.pointerId,
            offsetX: event.clientX - rect.left,
            offsetY: event.clientY - rect.top
        };
        previewPanel.style.left = `${rect.left}px`;
        previewPanel.style.top = `${rect.top}px`;
        previewPanel.style.right = 'auto';
        previewPanel.classList.add('dragging');
        previewHeader.setPointerCapture(event.pointerId);
        event.preventDefault();
    });

    previewHeader.addEventListener('pointermove', (event) => {
        if (!previewDrag || event.pointerId !== previewDrag.pointerId) return;
        const maxLeft = Math.max(10, window.innerWidth - previewPanel.offsetWidth - 10);
        const maxTop = Math.max(10, window.innerHeight - 48);
        previewPanel.style.left = `${clamp(event.clientX - previewDrag.offsetX, 10, maxLeft)}px`;
        previewPanel.style.top = `${clamp(event.clientY - previewDrag.offsetY, 10, maxTop)}px`;
    });

    function endPreviewDrag(event) {
        if (!previewDrag || event.pointerId !== previewDrag.pointerId) return;
        previewPanel.classList.remove('dragging');
        previewDrag = null;
        if (previewHeader.hasPointerCapture(event.pointerId)) {
            previewHeader.releasePointerCapture(event.pointerId);
        }
    }

    previewHeader.addEventListener('pointerup', endPreviewDrag);
    previewHeader.addEventListener('pointercancel', endPreviewDrag);
    window.addEventListener('resize', clampPreviewToViewport);

    // 1. Process Local M3U File
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        loadedPlaylistFileName = file.name || loadedPlaylistFileName;
        const reader = new FileReader();
        reader.onload = (evt) => loadData(evt.target.result);
        reader.readAsText(file);
        fileInput.value = '';
    });

    mergeFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => mergeData(evt.target.result);
        reader.readAsText(file);
        mergeFileInput.value = '';
    });

    // 2. Process Remote M3U Link via CORS Proxy
    function normalizePlaylistUrl(url) {
        let cleanUrl = url.trim();
        cleanUrl = cleanUrl.replace('github.com/', 'raw.githubusercontent.com/');
        cleanUrl = cleanUrl.replace('/blob/', '/');
        cleanUrl = cleanUrl.replace('/refs/heads/', '/');
        return cleanUrl;
    }

    async function fetchPlaylistText(url) {
        const cleanUrl = normalizePlaylistUrl(url);
        const urlsToTry = [
            cleanUrl,
            `https://corsproxy.io/?${encodeURIComponent(cleanUrl)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(cleanUrl)}`
        ];

        let lastError = null;
        for (const fetchUrl of urlsToTry) {
            try {
                const response = await fetch(fetchUrl, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.text();
                if (!data.includes('#EXTM3U') && !data.includes('#EXTINF')) {
                    throw new Error('Response was not an M3U playlist');
                }
                return data;
            } catch (err) {
                lastError = err;
            }
        }

        throw lastError || new Error('Unable to fetch playlist');
    }

    fetchUrlBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        if (!url) return alert('Please paste an M3U URL link first.');
        
        fetchUrlBtn.innerText = '⏳ Processing...';
        fetchUrlBtn.disabled = true;
        
        try {
            const data = await fetchPlaylistText(url);
            const urlPath = new URL(normalizePlaylistUrl(url), location.href).pathname;
            const fileName = decodeURIComponent(urlPath.split('/').pop() || '').trim();
            if (/\.(m3u|m3u8)$/i.test(fileName)) loadedPlaylistFileName = fileName;
            loadData(data);
        } catch (err) {
            alert(`Failed fetching M3U: ${err.message}`);
        } finally {
            fetchUrlBtn.innerText = '🌐 Fetch Link';
            fetchUrlBtn.disabled = false;
        }
    });

    mergeUrlBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        if (!url) return alert('Please paste an M3U URL link first.');
        
        mergeUrlBtn.innerText = '⏳ Merging...';
        mergeUrlBtn.disabled = true;
        
        try {
            const data = await fetchPlaylistText(url);
            mergeData(data);
        } catch (err) {
            alert(`Failed merging M3U: ${err.message}`);
        } finally {
            mergeUrlBtn.innerText = '➕ Merge Link';
            mergeUrlBtn.disabled = false;
        }
    });

    function loadData(textData) {
        parseM3U(textData);
        sortDefaultCategoryAndChannel();
        originalOrder = [...playlistChannels];
        expandedCategories.clear();
        enableControls();
        populateCategoryOrderSelect();
        populateCategories();
        filterAndRender();
    }

    function mergeData(textData) {
        const beforeCount = playlistChannels.length;
        parseM3U(textData, true);
        sortDefaultCategoryAndChannel();
        originalOrder = [...playlistChannels];
        expandedCategories.clear();
        enableControls();
        populateCategoryOrderSelect();
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Merged playlist with original groups';
        }
        alert(`Merged ${playlistChannels.length - beforeCount} channel${playlistChannels.length - beforeCount === 1 ? '' : 's'} and kept original group names.`);
    }

    function reloadFromText(textData) {
        loadData(textData);
    }

    // 3. Bulletproof Multi-Format Parser
    function parseExtinfAttributes(line) {
        const commaIndex = line.lastIndexOf(',');
        const attrText = commaIndex !== -1 ? line.substring(0, commaIndex) : line;
        const attrs = {};
        const attrOrder = [];
        const attrRegex = /([\w:-]+)="([^"]*)"/g;
        let match;
        while ((match = attrRegex.exec(attrText)) !== null) {
            attrs[match[1]] = match[2];
            attrOrder.push(match[1]);
        }
        return { attrs, attrOrder };
    }

    function parseM3U(data, append = false) {
        const lines = data.split(/\r?\n/);
        if (!append) playlistChannels = [];
        let currentChannel = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            if (line.startsWith('#EXTINF:')) {
                const commaIndex = line.lastIndexOf(',');
                let name = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : 'Unknown Channel';
                const extinfData = parseExtinfAttributes(line);
                
                const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
                let logo = logoMatch ? logoMatch[1] : '';

                const epgMatch = line.match(/tvg-id="([^"]*)"/i);
                let epgId = epgMatch ? epgMatch[1] : '';

                const groupMatch = line.match(/group-title="([^"]*)"/i);
                let group = groupMatch ? groupMatch[1] : 'Uncategorized';

                currentChannel = {
                    name: name,
                    logo: logo,
                    epgId: epgId,
                    group: group,
                    attrs: extinfData.attrs,
                    attrOrder: extinfData.attrOrder,
                    props: [],
                    status: 'unchecked'
                };
            } else if (line.startsWith('http') || line.startsWith('rtmp') || line.startsWith('rtsp')) {
                if (currentChannel) {
                    currentChannel.url = line;
                    playlistChannels.push(currentChannel);
                    currentChannel = null;
                } else {
                    // Handle stray URLs without parent #EXTINF lines safely
                    playlistChannels.push({
                        name: line.split('/').pop() || 'Untitled Stream',
                        logo: '',
                        epgId: '',
                        group: 'Uncategorized',
                        attrs: {},
                        attrOrder: [],
                        props: [],
                        url: line,
                        status: 'unchecked'
                    });
                }
            } else if (currentChannel && line.startsWith('#')) {
                currentChannel.props.push(normalizeLicenseKeyLine(line));
            }
        }
        originalOrder = [...playlistChannels];
        updateStats();
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function licenseKeyPropIndex(channel) {
        return (channel.props || []).findIndex(line =>
            /^#KODIPROP:inputstream\.adaptive\.license_key=/i.test(String(line || '').trim())
        );
    }

    function getLicenseKey(channel) {
        const idx = licenseKeyPropIndex(channel);
        if (idx === -1) return '';
        const line = String(channel.props[idx] || '');
        const equalIndex = line.indexOf('=');
        return equalIndex === -1 ? '' : line.slice(equalIndex + 1).trim();
    }

    function setLicenseKey(channel, value) {
        const rawValue = String(value || '').trim();
        const cleanValue = clearKeyHexStringFromValue(rawValue) || rawValue;
        channel.props = channel.props || [];
        const keyLine = `#KODIPROP:inputstream.adaptive.license_key=${cleanValue}`;
        const keyIndex = licenseKeyPropIndex(channel);

        if (!cleanValue) {
            if (keyIndex !== -1) channel.props.splice(keyIndex, 1);
            return;
        }

        if (keyIndex !== -1) {
            channel.props[keyIndex] = keyLine;
            return;
        }

        const licenseTypeIndex = channel.props.findIndex(line =>
            /^#KODIPROP:inputstream\.adaptive\.license_type=/i.test(String(line || '').trim())
        );
        if (licenseTypeIndex !== -1) {
            channel.props.splice(licenseTypeIndex + 1, 0, keyLine);
        } else {
            channel.props.push(keyLine);
        }
    }

    function customPlaylistGroups() {
        return [...new Set(playlistChannels
            .map(ch => String(ch.group || '').trim())
            .filter(group => group && !autoCategoryOrder.includes(group)))]
            .sort((a, b) => a.localeCompare(b));
    }

    function getGroupOptions(currentGroup) {
        const groups = [...autoCategoryOrder, ...customPlaylistGroups()];
        const cleanCurrentGroup = String(currentGroup || '').trim();
        if (cleanCurrentGroup && !groups.includes(cleanCurrentGroup)) groups.push(cleanCurrentGroup);
        return groups;
    }

    // 4. Render Layout
    function categoryKey(group) {
        return String(group || 'Uncategorized').trim() || 'Uncategorized';
    }

    function categoryDisplayName(group) {
        return categoryKey(group);
    }

    function categoryRankValue(group) {
        const cleanGroup = categoryKey(group);
        const autoRank = autoCategoryOrder.indexOf(cleanGroup);
        return autoRank === -1 ? 1000 : autoRank;
    }

    function compareCategoryNames(a, b) {
        const rankDiff = categoryRankValue(a) - categoryRankValue(b);
        if (rankDiff !== 0) return rankDiff;
        return categoryDisplayName(a).localeCompare(categoryDisplayName(b));
    }

    function sortDefaultCategoryAndChannel() {
        playlistChannels.sort((a, b) => {
            const categoryDiff = compareCategoryNames(a.group, b.group);
            if (categoryDiff !== 0) return categoryDiff;
            return String(a.name || '').localeCompare(String(b.name || ''));
        });
    }

    function channelStatusSummary(channels) {
        const counts = channels.reduce((summary, ch) => {
            const status = ch.status || 'unchecked';
            summary[status] = (summary[status] || 0) + 1;
            return summary;
        }, {});
        return [
            `${channels.length} channel${channels.length === 1 ? '' : 's'}`,
            `${counts.online || 0} online`,
            `${counts.offline || 0} offline`,
            `${counts.geoblocked || 0} geoblocked`,
            `${counts.unchecked || 0} unchecked`
        ];
    }

    function statusTooltip(channel) {
        const parts = [];
        if (channel.latencyMs) parts.push(`${channel.latencyMs} ms`);
        if (channel.errorDetails) parts.push(channel.errorDetails);
        return parts.join(' | ');
    }

    function createChannelRow(ch, displayIndex) {
        const channelIndex = playlistChannels.indexOf(ch);
        const groupOptions = getGroupOptions(ch.group);
        const statusTitle = statusTooltip(ch);
        const tr = document.createElement('tr');
        tr.className = 'channel-row';
        tr.innerHTML = `
            <td style="color: #64748b;">${displayIndex + 1}</td>
            <td>
                <div class="logo-editor">
                    <img class="channel-logo" src="${escapeHtml(ch.logo || '')}" onerror="this.style.display='none'">
                    <input class="logo-input" type="text" value="${escapeHtml(ch.logo || '')}" oninput="this.previousElementSibling.src = this.value; this.previousElementSibling.style.display = this.value ? '' : 'none';" onblur="updateField(${channelIndex}, 'logo', this.value)">
                </div>
            </td>
            <td><div class="editable" contenteditable="true" onblur="updateField(${channelIndex}, 'name', this.innerText)">${ch.name}</div></td>
            <td>
                <select class="group-select" onchange="updateField(${channelIndex}, 'group', this.value)">
                    ${groupOptions.map(group => `<option value="${escapeHtml(group)}" ${group === ch.group ? 'selected' : ''}>${escapeHtml(group)}</option>`).join('')}
                </select>
            </td>
            <td><input class="epg-input" type="text" value="${escapeHtml(ch.epgId || '')}" onblur="updateField(${channelIndex}, 'epgId', this.value)"></td>
            <td><input class="key-input" type="text" value="${escapeHtml(getLicenseKey(ch))}" onblur="updateField(${channelIndex}, 'licenseKey', this.value)"></td>
            <td><div class="editable" contenteditable="true" onblur="updateField(${channelIndex}, 'url', this.innerText)">${ch.url}</div></td>
            <td><span class="status-badge status-${ch.status}" id="status-${channelIndex}" title="${escapeHtml(statusTitle)}">${statusLabel(ch.status)}</span></td>
            <td><button onclick="playChannel(${channelIndex})">▶</button> <button class="btn-danger" onclick="deleteChannel(${channelIndex})">🗑️</button></td>
        `;
        return tr;
    }

    function renderTable(channels) {
        tableBody.innerHTML = '';
        const groups = new Map();
        channels.forEach(ch => {
            const group = categoryKey(ch.group);
            if (!groups.has(group)) groups.set(group, []);
            groups.get(group).push(ch);
        });

        [...groups.entries()]
            .sort(([groupA], [groupB]) => compareCategoryNames(groupA, groupB))
            .forEach(([group, groupChannels]) => {
                groupChannels.sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
                const expanded = expandedCategories.has(group);
                const categoryRow = document.createElement('tr');
                categoryRow.className = 'category-row';
                categoryRow.innerHTML = `
                    <td class="category-cell" colspan="9">
                        <div class="category-line">
                            <span class="category-name">${expanded ? '▾' : '▸'} ${escapeHtml(categoryDisplayName(group))}</span>
                            <span class="category-summary">
                                ${channelStatusSummary(groupChannels).map(item => `<span>${escapeHtml(item)}</span>`).join('')}
                            </span>
                        </div>
                    </td>
                `;
                categoryRow.addEventListener('click', () => {
                    if (expandedCategories.has(group)) {
                        expandedCategories.delete(group);
                    } else {
                        expandedCategories.add(group);
                    }
                    filterAndRender();
                });
                tableBody.appendChild(categoryRow);

                if (expanded) {
                    groupChannels.forEach((ch, idx) => {
                        tableBody.appendChild(createChannelRow(ch, idx));
                    });
                }
            });
    }

    function base64ToHex(value) {
        try {
            let normalized = String(value || '').trim().replace(/-/g, '+').replace(/_/g, '/');
            const padding = normalized.length % 4;
            if (padding) normalized += '='.repeat(4 - padding);
            const binary = atob(normalized);
            return Array.from(binary, char => char.charCodeAt(0).toString(16).padStart(2, '0')).join('');
        } catch (_) {
            return '';
        }
    }

    function decodeLegacyKeyText(value) {
        try {
            return decodeURIComponent(String(value || '').trim().replace(/\+/g, '%20'));
        } catch (_) {
            return String(value || '').trim();
        }
    }

    function drmKeyValueToHex(value) {
        const text = String(value || '').trim().replace(/^['"]|['"]$/g, '');
        const hex = text.replace(/[^a-fA-F0-9]/g, '').toLowerCase();
        if (hex.length === 32) return hex;
        return base64ToHex(text);
    }

    function clearKeyPairsFromValue(value) {
        const cleanValue = String(value || '').trim().replace(/^['"]|['"]$/g, '');
        if (!cleanValue) return {};
        const clearKeys = {};

        if (cleanValue.startsWith('{')) {
            try {
                const json = JSON.parse(cleanValue);
                const keys = Array.isArray(json.keys) ? json.keys : [];
                keys.forEach(entry => {
                    const keyHex = drmKeyValueToHex(entry?.k);
                    const kidHex = drmKeyValueToHex(entry?.kid);
                    if (keyHex.length === 32 && kidHex.length === 32) {
                        clearKeys[kidHex.toLowerCase()] = keyHex.toLowerCase();
                    }
                });
                return clearKeys;
            } catch (_) {
                return {};
            }
        }

        decodeLegacyKeyText(cleanValue).split(/[;,\s]+/).forEach(pair => {
            const separator = pair.includes(':') ? ':' : '=';
            const parts = pair.split(separator).map(part => part.trim().replace(/^0x/i, '').replace(/[^a-fA-F0-9]/g, '').toLowerCase());
            if (parts.length === 2 && parts[0].length === 32 && parts[1].length === 32) {
                clearKeys[parts[0]] = parts[1];
            }
        });
        return clearKeys;
    }

    function clearKeyHexStringFromValue(value) {
        const clearKeys = clearKeyPairsFromValue(value);
        return Object.entries(clearKeys).map(([kid, key]) => `${kid}:${key}`).join(',');
    }

    function clearKeyConfigFromValue(value) {
        const clearKeys = clearKeyPairsFromValue(value);
        return Object.keys(clearKeys).length ? {
            drm: {
                clearKeys
            }
        } : {};
    }

    function swapGuidEndianHex(hex) {
        const clean = String(hex || '').replace(/[^a-fA-F0-9]/g, '').toLowerCase();
        if (clean.length !== 32) return '';
        const bytes = clean.match(/../g);
        const swapped = [
            bytes[3], bytes[2], bytes[1], bytes[0],
            bytes[5], bytes[4],
            bytes[7], bytes[6],
            ...bytes.slice(8)
        ];
        return swapped.join('');
    }

    function clearKeyConfigVariantsFromValue(value) {
        const pairs = clearKeyPairsFromValue(value);
        const entries = Object.entries(pairs);
        if (!entries.length) return [];

        const variants = [];
        const seen = new Set();
        const addVariant = (label, mappedEntries) => {
            const clearKeys = {};
            mappedEntries.forEach(([kid, key]) => {
                if (/^[a-f0-9]{32}$/i.test(kid) && /^[a-f0-9]{32}$/i.test(key)) {
                    clearKeys[kid.toLowerCase()] = key.toLowerCase();
                }
            });
            const signature = JSON.stringify(clearKeys);
            if (!Object.keys(clearKeys).length || seen.has(signature)) return;
            seen.add(signature);
            variants.push({ label, config: { drm: { clearKeys } } });
        };

        addVariant('normal key id', entries);
        addVariant('alternate key id byte order', entries.map(([kid, key]) => [swapGuidEndianHex(kid), key]));
        addVariant('reversed key pair', entries.map(([kid, key]) => [key, kid]));
        return variants;
    }

    function normalizeLicenseKeyLine(line) {
        const text = String(line || '').trim();
        if (!/^#KODIPROP:inputstream\.adaptive\.license_key=/i.test(text)) return line;
        const equalIndex = text.indexOf('=');
        if (equalIndex === -1) return line;
        const normalizedKey = clearKeyHexStringFromValue(text.slice(equalIndex + 1));
        return normalizedKey ? `${text.slice(0, equalIndex + 1)}${normalizedKey}` : line;
    }

    function shortUrl(value) {
        const text = String(value || '');
        return text.length > 130 ? `${text.slice(0, 90)}...${text.slice(-32)}` : text;
    }

    function shakaErrorData(err) {
        return err?.data || err?.detail?.data || [];
    }

    function httpStatusExplanation(status) {
        const explanations = {
            0: 'The browser got no readable HTTP response.',
            400: 'The server rejected the request as invalid.',
            401: 'The stream needs authorization or a fresh token.',
            403: 'Access is forbidden. This can be auth, token, ISP, or region blocking.',
            404: 'The requested manifest or segment was not found.',
            410: 'The requested stream URL is gone or expired.',
            451: 'The server says this content is blocked for legal or regional reasons.',
            429: 'The server is rate-limiting too many requests.',
            500: 'The stream server failed internally.',
            502: 'The CDN or gateway received a bad upstream response.',
            503: 'The stream service is unavailable right now.',
            504: 'The CDN or gateway timed out waiting for the stream server.'
        };
        return explanations[status] || (status >= 500
            ? 'The CDN or stream server is failing.'
            : 'The stream server returned an error status.');
    }

    function shakaCodeExplanation(code) {
        const explanations = {
            1000: 'Unsupported URL scheme. The stream URL is not a normal http/https playable URL.',
            1001: 'Network request failed before Shaka got a response.',
            1002: 'Network/HTTP error. Shaka could not download the manifest, key file, or a media segment.',
            1003: 'Network timeout. The stream server did not respond fast enough.',
            1004: 'Bad data URI in the stream.',
            2000: 'Bad or unsupported manifest data.',
            3000: 'Browser media pipeline error.',
            4000: 'Manifest parsing/loading error.',
            5000: 'Streaming engine error while buffering or fetching segments.',
            6000: 'Encrypted stream, but Shaka could not detect a usable DRM system.',
            6001: 'The browser does not allow the requested DRM/key-system configuration.',
            6002: 'The browser found the DRM system but failed to create the DRM session.',
            6003: 'The browser created DRM but could not attach it to the video element.',
            6005: 'The browser refused to create a DRM session.',
            6006: 'The browser could not generate a DRM license request.',
            6007: 'The DRM license request failed.',
            6008: 'The DRM license response was rejected.',
            6010: 'The content is encrypted but the manifest does not include usable DRM info.',
            6012: 'The stream needs a license server, but none was configured.',
            6020: 'This browser has no EME/DRM support.',
            7000: 'Playback load was interrupted by another load/stop action.',
            9000: 'Offline/storage playback is not supported here.'
        };
        if (explanations[code]) return explanations[code];
        if (code >= 1000 && code < 2000) return 'Network layer error. The browser could not fetch something Shaka needs.';
        if (code >= 2000 && code < 3000) return 'Text or manifest parsing error.';
        if (code >= 3000 && code < 4000) return 'Media decoding or browser video pipeline error.';
        if (code >= 4000 && code < 5000) return 'Manifest error. The playlist structure may be unsupported or broken.';
        if (code >= 5000 && code < 6000) return 'Streaming error while loading or buffering media segments.';
        if (code >= 6000 && code < 7000) return 'DRM error. The key, license, browser DRM support, or stream DRM metadata may be wrong.';
        if (code >= 7000 && code < 8000) return 'Player operation error.';
        return 'Unknown Shaka error.';
    }

    function shakaTryHint(code) {
        if (code >= 1000 && code < 2000) return 'Try opening the failed URL in the browser, refreshing the playlist link, or using a stream/proxy source that allows browser CORS.';
        if (code >= 3000 && code < 4000) return 'Try Chrome or Edge, or another channel quality/URL if available.';
        if (code >= 4000 && code < 6000) return 'Try refreshing the stream URL; the manifest may be expired, malformed, or using unsupported encryption/media.';
        if (code >= 6000 && code < 7000) return 'Check the Key column, use localhost, and confirm the stream really uses ClearKey instead of Widevine/PlayReady license-server DRM.';
        return 'Try replaying the channel or checking whether the stream URL still works.';
    }

    function networkErrorHint(status, detail) {
        const text = String(detail || '').toLowerCase();
        if (status === 0 || text.includes('failed to fetch') || text.includes('cors')) {
            return 'The stream server is probably blocking browser CORS. Android apps can still play some of these, but a browser cannot without a streaming proxy.';
        }
        if (status === 401 || status === 403) return 'The link may need auth headers, a fresh token, or your ISP/location may be blocked.';
        if (status === 404 || status === 410) return 'The manifest or segment URL may be expired or removed.';
        if (status === 451) return 'The server is reporting a legal/region block.';
        if (status >= 500) return 'The CDN/server is failing right now.';
        return 'The browser could not fetch the manifest or one of its video/audio segments.';
    }

    function playbackErrorMessage(err, channel) {
        const code = err?.code || err?.detail?.code;
        const data = shakaErrorData(err);
        const detail = data[2] || data[0] || err?.message || '';
        if (code === 1002) {
            const failedUrl = data.find(item => typeof item === 'string' && /^https?:\/\//i.test(item)) || data[0] || '';
            const status = data.find(item => typeof item === 'number') || 0;
            const statusText = status ? ` HTTP ${status}.` : '';
            const urlText = failedUrl ? ` Failed URL: ${shortUrl(failedUrl)}.` : '';
            const httpText = status ? ` HTTP meaning: ${httpStatusExplanation(status)}` : '';
            return `Shaka error 1002. Meaning: ${shakaCodeExplanation(1002)}${statusText}${httpText}${urlText} Cause: ${networkErrorHint(status, detail)} Try: ${shakaTryHint(1002)}`;
        }
        if (code === 6002) {
            const hasKey = Boolean(getLicenseKey(channel));
            const localFileHint = location.protocol === 'file:' || !window.isSecureContext
                ? ' Open this editor through http://localhost:8765/index.html for DRM preview.'
                : '';
            const detailHint = detail ? ` Browser says: ${detail}` : '';
            return hasKey
                ? `Shaka error 6002. Meaning: ${shakaCodeExplanation(6002)} Cause: The key may not match, the stream may not be ClearKey, or the browser cannot create the DRM session.${detailHint}${localFileHint} Try: ${shakaTryHint(6002)}`
                : `Shaka error 6002. Meaning: ${shakaCodeExplanation(6002)} Cause: This stream is encrypted and needs a ClearKey in the Key column.${detailHint}${localFileHint} Try: ${shakaTryHint(6002)}`;
        }
        if (code) {
            const detailHint = detail ? ` Detail: ${detail}` : '';
            return `Shaka error ${code}. Meaning: ${shakaCodeExplanation(code)}${detailHint} Try: ${shakaTryHint(code)}`;
        }
        return err?.message || String(err || 'Unknown playback error');
    }

    async function ensureClearKeyCanStart() {
        if (!navigator.requestMediaKeySystemAccess) {
            throw new Error('This browser has no EME DRM support. Try Chrome or Edge on http://localhost.');
        }
    }

    async function stopPreview() {
        if (previewPlayer) {
            await previewPlayer.destroy().catch(() => {});
            previewPlayer = null;
        }
        previewVideo.pause();
        previewVideo.removeAttribute('src');
        previewVideo.load();
        if (previewVideo.setMediaKeys) {
            await previewVideo.setMediaKeys(null).catch(() => {});
        }
        previewStatus.innerText = 'Stopped';
    }

    async function ensurePreviewPlayer() {
        if (!window.shaka) throw new Error('Preview player library is not loaded. Check your internet connection.');
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            throw new Error('This browser does not support the video/DRM features needed for Shaka playback.');
        }
        if (previewPlayer) await previewPlayer.destroy().catch(() => {});
        previewPlayer = new shaka.Player(previewVideo);
        previewPlayer.configure({
            manifest: {
                retryParameters: {
                    maxAttempts: 4,
                    baseDelay: 500,
                    backoffFactor: 2,
                    fuzzFactor: 0.5,
                    timeout: 15000
                }
            },
            streaming: {
                retryParameters: {
                    maxAttempts: 4,
                    baseDelay: 500,
                    backoffFactor: 2,
                    fuzzFactor: 0.5,
                    timeout: 15000
                }
            },
            drm: {
                retryParameters: {
                    maxAttempts: 3,
                    baseDelay: 500,
                    backoffFactor: 2,
                    fuzzFactor: 0.5,
                    timeout: 15000
                }
            }
        });
        previewPlayer.addEventListener('error', event => {
            previewStatus.innerText = `Could not play: ${playbackErrorMessage(event.detail || event, activePreviewChannel || {})}`;
        });
        return previewPlayer;
    }

    window.playChannel = async function(index) {
        const channel = playlistChannels[index];
        if (!channel) return;
        const url = String(channel.url || '').trim();
        if (!url) return alert('This channel has no stream URL.');

        activePreviewChannel = channel;
        previewPanel.classList.add('active');
        previewTitle.innerText = channel.name || 'Preview';
        previewStatus.innerText = 'Loading...';

        try {
            if (previewPlayer) {
                await previewPlayer.destroy().catch(() => {});
                previewPlayer = null;
            }
            previewStatus.innerText = 'Loading...';
            const ext = streamExtension(url);

            if ((ext === 'mpd' || ext === 'm3u8') && window.shaka) {
                const rawKey = getLicenseKey(channel);
                const keyVariants = clearKeyConfigVariantsFromValue(rawKey);
                if (keyVariants.length) {
                    await ensureClearKeyCanStart();
                }
                const variantsToTry = [
                    { label: 'no key', config: null },
                    ...keyVariants
                ];
                let lastPlayError = null;

                for (let attempt = 0; attempt < variantsToTry.length; attempt++) {
                    const variant = variantsToTry[attempt];
                    try {
                        if (attempt > 0 && previewPlayer) {
                            await previewPlayer.destroy().catch(() => {});
                            previewPlayer = null;
                        }
                        previewStatus.innerText = variant.label ? `Loading with ${variant.label}...` : 'Loading...';
                        const player = await ensurePreviewPlayer();
                        if (variant.config?.drm) player.configure(variant.config);
                        await player.load(url);
                        lastPlayError = null;
                        break;
                    } catch (err) {
                        lastPlayError = err;
                    }
                }

                if (lastPlayError) throw lastPlayError;
            } else {
                previewVideo.src = url;
                previewVideo.load();
            }

            await previewVideo.play();
            previewStatus.innerText = 'Playing';
        } catch (err) {
            if (streamExtension(url) === 'm3u8') {
                try {
                    previewVideo.src = url;
                    previewVideo.load();
                    await previewVideo.play();
                    previewStatus.innerText = 'Playing';
                    return;
                } catch (nativeErr) {
                    err = nativeErr;
                }
            }
            previewStatus.innerText = `Could not play: ${playbackErrorMessage(err, channel)}`;
        }
    };

    stopPreviewBtn.addEventListener('click', () => stopPreview());
    closePreviewBtn.addEventListener('click', async () => {
        await stopPreview();
        previewPanel.classList.remove('active');
    });

    // 5. Modifications Management
    window.updateField = function(index, field, value) {
        if (field === 'licenseKey') {
            setLicenseKey(playlistChannels[index], value);
            filterAndRender();
            if (textEditorPanel.classList.contains('active')) {
                m3uTextEditor.value = buildM3UContent();
                textSaveStatus.innerText = 'Text updated from table';
            }
            return;
        }

        const cleanValue = value.trim();
        playlistChannels[index][field] = field === 'group' && !getGroupOptions(playlistChannels[index]?.group).includes(cleanValue)
            ? 'Entertainment'
            : cleanValue;
        if (field === 'group') {
            sortByCategoryOrder();
            isSorted = false;
            sortBtn.innerText = '🔀 Sort A-Z';
            populateCategories();
            filterAndRender();
        }
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Text updated from table';
        }
    };

    window.deleteChannel = function(index) {
        playlistChannels.splice(index, 1);
        updateStats();
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Text updated from table';
        }
    };

    function duplicateStreamKey(url) {
        const cleanUrl = String(url || '').trim();
        const pathOnly = cleanUrl.split(/[?#]/)[0].toLowerCase();
        if (!/\.(mpd|m3u8|ts)$/.test(pathOnly)) return '';
        return cleanUrl.toLowerCase();
    }

    function hasEpgId(channel) {
        return Boolean(String(channel?.epgId || channel?.attrs?.['tvg-id'] || '').trim());
    }

    deleteDuplicatesBtn.addEventListener('click', () => {
        const keeperByKey = new Map();
        let removedCount = 0;

        playlistChannels.forEach(ch => {
            const key = duplicateStreamKey(ch.url);
            if (!key) return;
            const currentKeeper = keeperByKey.get(key);
            if (!currentKeeper || (!hasEpgId(currentKeeper) && hasEpgId(ch))) {
                keeperByKey.set(key, ch);
            }
        });

        playlistChannels = playlistChannels.filter(ch => {
            const key = duplicateStreamKey(ch.url);
            if (!key) return true;
            if (keeperByKey.get(key) !== ch) {
                removedCount++;
                return false;
            }
            return true;
        });

        originalOrder = [...playlistChannels];
        updateStats();
        populateCategories();

    function channelLogoSearchText(channel) {
        return normalizeWords(`${channel?.name || ''} ${channel?.group || ''} ${channel?.epgId || ''}`);
    }

    function cleanChannelLogoQuery(channel) {
        return String(channel?.name || channel?.epgId || '')
            .replace(/\b(raw|hd|fhd|uhd|sd|4k|60fps|50fps|30fps|24\/7|live|channel|tv)\b/gi, ' ')
            .replace(/\[[^\]]*\]|\([^\)]*\)/g, ' ')
            .replace(/[^a-z0-9+&.\- ]+/gi, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function logoCandidatesForDomain(domain) {
        if (!domain) return [];
        const cleanDomain = String(domain).replace(/^https?:\/\//i, '').replace(/^www\./i, '').split('/')[0];
        return [
            `https://logo.clearbit.com/${encodeURIComponent(cleanDomain)}`,
            `https://www.google.com/s2/favicons?sz=128&domain=${encodeURIComponent(cleanDomain)}`,
            `https://icons.duckduckgo.com/ip3/${encodeURIComponent(cleanDomain)}.ico`
        ];
    }

    function logoDomainsForChannel(channel) {
        const text = channelLogoSearchText(channel);
        const domains = [];
        logoDomainRules.forEach(rule => {
            if (rule.terms.some(term => text.includes(normalizeWords(term)))) {
                domains.push(rule.domain);
            }
        });
        return [...new Set(domains)];
    }

    function wikiLogoSearchUrls(channel) {
        const query = cleanChannelLogoQuery(channel);
        if (!query || query.length < 2) return [];
        const searches = [
            `${query} television channel logo`,
            `${query} TV channel logo`,
            `${query} logo`
        ];
        return [...new Set(searches)].map(search =>
            `https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(search)}&gsrlimit=6&prop=pageimages|pageprops&piprop=thumbnail&pithumbsize=256&format=json&origin=*`
        );
    }

    function wikiTitleScore(title, channel) {
        const titleText = normalizeWords(title);
        const queryText = normalizeWords(cleanChannelLogoQuery(channel));
        if (!titleText || !queryText) return 0;
        let score = 0;
        if (titleText === queryText) score += 100;
        if (titleText.includes(queryText)) score += 70;
        queryText.split(/\s+/).filter(word => word.length > 1).forEach(word => {
            if (titleText.includes(word)) score += 12;
        });
        if (titleText.includes('television')) score += 16;
        if (titleText.includes('channel')) score += 14;
        if (titleText.includes('tv')) score += 10;
        if (titleText.includes('radio')) score -= 20;
        if (titleText.includes('station') && !queryText.includes('station')) score -= 8;
        return score;
    }

    async function wikipediaLogoCandidates(channel) {
        const candidates = [];
        for (const apiUrl of wikiLogoSearchUrls(channel)) {
            try {
                const response = await fetch(apiUrl, { cache: 'no-store' });
                if (!response.ok) continue;
                const json = await response.json();
                const pages = Object.values(json?.query?.pages || {})
                    .filter(page => page?.thumbnail?.source)
                    .map(page => ({
                        url: String(page.thumbnail.source).replace(/^http:/i, 'https:'),
                        score: wikiTitleScore(page.title, channel),
                        title: page.title
                    }))
                    .filter(page => page.score > 0)
                    .sort((a, b) => b.score - a.score);
                pages.forEach(page => candidates.push(page.url));
            } catch (_) {
                // Ignore search failures and try the next lookup.
            }
        }
        return [...new Set(candidates)];
    }

    function canLoadImage(url, timeoutMs = 5000) {
        return new Promise(resolve => {
            const img = new Image();
            const timer = setTimeout(() => {
                cleanup();
                resolve(false);
            }, timeoutMs);
            const cleanup = () => {
                clearTimeout(timer);
                img.onload = null;
                img.onerror = null;
            };
            img.onload = () => {
                const ok = img.naturalWidth >= 16 && img.naturalHeight >= 16;
                cleanup();
                resolve(ok);
            };
            img.onerror = () => {
                cleanup();
                resolve(false);
            };
            img.referrerPolicy = 'no-referrer';
            img.src = url;
        });
    }

    async function findLogoForChannel(channel) {
        const candidates = [
            ...(await wikipediaLogoCandidates(channel)),
            ...logoDomainsForChannel(channel).flatMap(logoCandidatesForDomain)
        ];
        for (const candidate of candidates) {
            if (await canLoadImage(candidate)) return candidate;
        }
        return '';
    }

    // 6. Network Stream Validator
    function streamExtension(url) {
        const pathOnly = String(url || '').trim().split(/[?#]/)[0].toLowerCase();
        const match = pathOnly.match(/\.([a-z0-9]+)$/);
        return match ? match[1] : '';
    }

    function statusLabel(status) {
        if (status === 'geoblocked') return 'GEOBLOCK';
        return String(status || 'unchecked').toUpperCase();
    }

    function normalizeCheckStatus(status) {
        const clean = String(status || '').trim().toUpperCase();
        if (clean === 'ONLINE') return 'online';
        if (clean === 'GEOBLOCKED' || clean === 'GEOBLOCK') return 'geoblocked';
        if (clean === 'OFFLINE') return 'offline';
        return 'offline';
    }

    function checkerBatchApiUrl() {
        const value = String(checkerApiInput.value || '').trim();
        if (!value) return '';
        return value.replace(/\/api\/check-stream\/?$/i, '/api/check-streams');
    }

    function backendCheckerHeaders() {
        return {
            'User-Agent': 'VLC/3.0.20 LibVLC/3.0.20 Player2TV/1.0 (SmartTV)',
            'Accept': '*/*'
        };
    }

    function looksLikeGeoBlockedPage(text) {
        const sample = String(text || '').slice(0, 5000).toLowerCase();
        return sample.includes('geo-block') ||
            sample.includes('geoblock') ||
            sample.includes('geo restricted') ||
            sample.includes('geo-restricted') ||
            sample.includes('geo restriction') ||
            sample.includes('geographical restriction') ||
            sample.includes('not available in your country') ||
            sample.includes('not available in this country') ||
            sample.includes('not available in your region') ||
            sample.includes('not available in this region') ||
            sample.includes('not available in your location') ||
            sample.includes('outside of your territory') ||
            sample.includes('outside your territory') ||
            sample.includes('country is not allowed') ||
            sample.includes('region is not allowed') ||
            sample.includes('blocked in your country') ||
            sample.includes('blocked in your region') ||
            sample.includes('access from your country') ||
            sample.includes('restricted in your country') ||
            sample.includes('restricted in your region') ||
            sample.includes('due to rights restrictions') ||
            sample.includes('content is not available') ||
            sample.includes('content unavailable in your area');
    }

    function responseLooksGeoblocked(response, bodyText) {
        if (!response || response.type === 'opaque') return false;
        if (response.status === 451) return true;
        if (response.status === 403) return true;
        if (response.status === 401 && looksLikeGeoBlockedPage(bodyText)) return true;
        return looksLikeGeoBlockedPage(bodyText);
    }

    function looksLikeBlockedPage(text) {
        const sample = String(text || '').slice(0, 4000).toLowerCase();
        return sample.includes('<html') ||
            sample.includes('<!doctype') ||
            sample.includes('access denied') ||
            sample.includes('forbidden') ||
            sample.includes('not available') ||
            sample.includes('unavailable') ||
            sample.includes('geo') ||
            sample.includes('blocked') ||
            sample.includes('not authorized') ||
            sample.includes('token expired');
    }

    function streamCheckUrls(url) {
        return [
            url,
            `https://corsproxy.io/?${encodeURIComponent(url)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        ];
    }

    function resolveStreamUrl(baseUrl, maybeRelativeUrl) {
        try {
            return new URL(String(maybeRelativeUrl || '').trim(), baseUrl).href;
        } catch (err) {
            return '';
        }
    }

    function hlsUriFromTag(line) {
        const match = String(line || '').match(/URI=(?:"([^"]+)"|([^,\s]+))/i);
        return match ? (match[1] || match[2] || '').trim() : '';
    }

    function firstHlsUrls(manifestText, manifestUrl) {
        const lines = String(manifestText || '').split(/\r?\n/).map(line => line.trim()).filter(Boolean);
        const urls = [];

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (/^#EXT-X-(STREAM-INF|I-FRAME-STREAM-INF):/i.test(line)) {
                const inlineUri = hlsUriFromTag(line);
                if (inlineUri) urls.push(resolveStreamUrl(manifestUrl, inlineUri));
                for (let j = i + 1; j < lines.length; j++) {
                    if (!lines[j].startsWith('#')) {
                        urls.push(resolveStreamUrl(manifestUrl, lines[j]));
                        break;
                    }
                }
            }
        }

        lines.forEach(line => {
            if (!line.startsWith('#') && !line.toLowerCase().startsWith('data:')) {
                urls.push(resolveStreamUrl(manifestUrl, line));
            }
        });

        return [...new Set(urls.filter(Boolean))].slice(0, 3);
    }

    function hlsTagUrls(manifestText, manifestUrl, tagName) {
        return String(manifestText || '')
            .split(/\r?\n/)
            .map(line => line.trim())
            .filter(line => line.toUpperCase().startsWith(`#EXT-X-${tagName}:`))
            .map(hlsUriFromTag)
            .filter(uri => uri && !uri.toLowerCase().startsWith('data:'))
            .map(uri => resolveStreamUrl(manifestUrl, uri))
            .filter(Boolean);
    }

    async function fetchStreamText(url, timeoutMs = 9000) {
        let sawGeoBlock = false;
        for (const checkUrl of streamCheckUrls(url)) {
            try {
                const response = await fetchWithTimeout(checkUrl, { method: 'GET' }, timeoutMs);
                const bodyText = await response.text();
                if (responseLooksGeoblocked(response, bodyText)) sawGeoBlock = true;
                if (response.ok && response.type !== 'opaque' && !looksLikeBlockedPage(bodyText)) {
                    return { status: 'online', response, bodyText };
                }
            } catch (err) {
                // Try the next strategy.
            }
        }
        return { status: sawGeoBlock ? 'geoblocked' : 'offline', response: null, bodyText: '' };
    }

    async function checkMediaSegmentUrl(url) {
        let sawGeoBlock = false;
        for (const checkUrl of streamCheckUrls(url)) {
            try {
                const response = await fetchWithTimeout(checkUrl, {
                    method: 'GET',
                    headers: { Range: 'bytes=0-4095' }
                }, 9000);
                const contentType = (response.headers.get('content-type') || '').toLowerCase();
                const bodyText = await response.text();
                if (responseLooksGeoblocked(response, bodyText)) sawGeoBlock = true;
                if (!response.ok || response.type === 'opaque' || looksLikeBlockedPage(bodyText)) continue;
                if (contentType.includes('text/html') || contentType.includes('application/json') || contentType.includes('text/plain')) continue;
                if (contentType.includes('video') || contentType.includes('audio') || contentType.includes('octet-stream') || contentType.includes('mp4') || contentType.includes('mpeg') || bodyText.length > 1000) {
                    return 'online';
                }
            } catch (err) {
                // Try the next strategy.
            }
        }
        return sawGeoBlock ? 'geoblocked' : 'offline';
    }

    async function validateHlsPlayback(manifestUrl, manifestText, depth = 0) {
        const text = String(manifestText || '').trim();
        if (!text.includes('#EXTM3U') || !/#EXT-X-(STREAM-INF|TARGETDURATION|MEDIA-SEQUENCE|INF|MEDIA|MAP):/i.test(text) || looksLikeBlockedPage(text)) {
            return 'offline';
        }
        if (depth > 2) return 'offline';

        const requiredSideUrls = [
            ...hlsTagUrls(text, manifestUrl, 'KEY'),
            ...hlsTagUrls(text, manifestUrl, 'MAP')
        ];
        for (const sideUrl of [...new Set(requiredSideUrls)]) {
            const sideStatus = await checkMediaSegmentUrl(sideUrl);
            if (sideStatus !== 'online') return sideStatus;
        }

        const urls = firstHlsUrls(text, manifestUrl);
        if (!urls.length) return 'offline';

        for (const nextUrl of urls) {
            if (streamExtension(nextUrl) === 'm3u8' || /#EXT-X-STREAM-INF:/i.test(text)) {
                const nextManifest = await fetchStreamText(nextUrl);
                if (nextManifest.status !== 'online') return nextManifest.status;
                const nestedStatus = await validateHlsPlayback(nextUrl, nextManifest.bodyText, depth + 1);
                if (nestedStatus === 'online') return 'online';
                if (nestedStatus === 'geoblocked') return 'geoblocked';
                continue;
            }

            const segmentStatus = await checkMediaSegmentUrl(nextUrl);
            if (segmentStatus === 'online') return 'online';
            if (segmentStatus === 'geoblocked') return 'geoblocked';
        }

        return 'offline';
    }

    function isValidStreamResponse(url, response, bodyText) {
        if (!response.ok || response.type === 'opaque') return false;

        const ext = streamExtension(url);
        const contentType = (response.headers.get('content-type') || '').toLowerCase();
        const text = String(bodyText || '').trim();
        if (looksLikeBlockedPage(text)) return false;

        if (ext === 'm3u8') {
            return text.includes('#EXTM3U') &&
                /#EXT-X-(STREAM-INF|TARGETDURATION|MEDIA-SEQUENCE|INF|MEDIA):/i.test(text);
        }

        if (ext === 'mpd') {
            return /<MPD[\s>]/i.test(text) &&
                /<(Period|AdaptationSet|Representation|BaseURL|SegmentTemplate)[\s>]/i.test(text);
        }

        if (ext === 'ts') {
            return !contentType.includes('text/html') &&
                !contentType.includes('application/json') &&
                !contentType.includes('text/plain') &&
                (contentType.includes('video') || contentType.includes('octet-stream') || bodyText.length > 1000);
        }

        return contentType.includes('video') || contentType.includes('mpegurl') || contentType.includes('dash+xml');
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 9000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { ...options, signal: controller.signal, cache: 'no-store' });
        } finally {
            clearTimeout(timeoutId);
        }
    }

    async function checkChannelsViaBackend(channels) {
        const apiUrl = checkerBatchApiUrl();
        if (!apiUrl || !channels.length) return null;
        const timeoutMs = Math.min(120000, Math.max(15000, channels.length * 800));
        const response = await fetchWithTimeout(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                channels: channels.map(channel => ({ url: channel.url })),
                headers: backendCheckerHeaders()
            })
        }, timeoutMs);
        if (!response.ok) throw new Error(`Checker API HTTP ${response.status}`);
        const payload = await response.json();
        if (!payload || !Array.isArray(payload.results)) throw new Error('Checker API returned an invalid response');
        return payload.results;
    }

    function applyCheckResult(channel, result) {
        channel.status = normalizeCheckStatus(result && result.status);
        channel.latencyMs = result && Number.isFinite(Number(result.latency_ms)) ? Number(result.latency_ms) : 0;
        channel.errorDetails = result && result.error_details ? String(result.error_details) : '';
        const currentIndex = playlistChannels.indexOf(channel);
        const badge = currentIndex !== -1 ? document.getElementById(`status-${currentIndex}`) : null;
        if (badge) {
            badge.className = `status-badge status-${channel.status}`;
            badge.innerText = statusLabel(channel.status);
            badge.title = statusTooltip(channel);
        }
    }

    async function checkStreamUrl(url) {
        const cleanUrl = url.trim();
        if (!cleanUrl) return 'offline';
        let sawGeoBlock = false;

        for (const checkUrl of streamCheckUrls(cleanUrl)) {
            try {
                const response = await fetchWithTimeout(checkUrl, {
                    method: 'GET',
                    headers: streamExtension(cleanUrl) === 'ts' ? { Range: 'bytes=0-4095' } : {}
                });
                const bodyText = await response.text();
                if (responseLooksGeoblocked(response, bodyText)) sawGeoBlock = true;
                if (streamExtension(cleanUrl) === 'm3u8') {
                    const hlsStatus = await validateHlsPlayback(cleanUrl, bodyText);
                    if (hlsStatus === 'online') return 'online';
                    if (hlsStatus === 'geoblocked') sawGeoBlock = true;
                    continue;
                }
                if (isValidStreamResponse(cleanUrl, response, bodyText)) return 'online';
            } catch (err) {
                // Try the next strategy. A strict check should fail closed.
            }
        }

        return sawGeoBlock ? 'geoblocked' : 'offline';
    }
