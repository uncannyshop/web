<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Playlist Studio (Compact)</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #16161a;
            --text-color: #e2e8f0;
            --accent-color: #4f46e5;
            --border-color: #24242b;
            --success: #16a34a;
            --error: #dc2626;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            font-size: 12px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        header h1 { font-size: 16px; margin: 0; }
        header p { margin: 0; color: #94a3b8; font-size: 11px; }

        .controls {
            background-color: var(--card-bg);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        button, input, select {
            background-color: #222227;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #channelSearchInput {
            min-width: 190px;
            cursor: text;
        }

        button:hover { background-color: var(--accent-color); }
        input[type="file"] { display: none; }
        
        .file-label {
            background-color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .toggle-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #cbd5e1;
            cursor: pointer;
            user-select: none;
        }

        .toggle-label input {
            margin: 0;
        }

        .stats {
            margin-left: auto;
            font-weight: bold;
            color: #94a3b8;
        }

        .table-container {
            overflow-x: auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            max-height: 78vh;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 4px 8px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        th {
            background-color: #1e1e24;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
        }

        tr:hover { background-color: #1c1c22; }

        .channel-logo {
            width: 20px;
            height: 20px;
            object-fit: contain;
            background: #222227;
            border-radius: 2px;
            vertical-align: middle;
        }

        .editable {
            background: transparent;
            border: 1px dashed transparent;
            padding: 2px 4px;
            outline: none;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .editable:focus {
            background: #222227;
            border: 1px solid var(--accent-color);
            border-radius: 2px;
            max-width: none;
            white-space: normal;
        }

        .group-select {
            min-width: 140px;
            max-width: 180px;
            padding: 3px 6px;
        }

        .logo-editor {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-input {
            width: 170px;
            cursor: text;
        }

        .epg-input {
            width: 130px;
            cursor: text;
        }

        .status-badge {
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            min-width: 55px;
        }

        .status-unchecked { background: #4b5563; }
        .status-online { background: var(--success); }
        .status-offline { background: var(--error); }
        .status-geoblocked { background: #d97706; }

        .btn-danger { 
            background-color: transparent; 
            border: none; 
            padding: 2px 4px;
        }
        .btn-danger:hover { background-color: var(--error); }

        .text-editor-panel {
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 8px;
        }

        .text-editor-panel.active { display: block; }

        #m3uTextEditor {
            width: 100%;
            min-height: 260px;
            box-sizing: border-box;
            background: #101014;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            font-family: Consolas, Monaco, monospace;
            font-size: 12px;
            resize: vertical;
        }

        .text-editor-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
            align-items: center;
        }

        .text-save-status {
            color: #94a3b8;
            margin-right: auto;
        }

        .progress-panel {
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 10px;
        }

        .progress-panel.active { display: block; }

        .progress-row {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .progress-track {
            height: 10px;
            background: #222227;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            transition: width 0.15s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>📺 M3U Playlist Studio</h1>
            <p>Click directly into any cell to edit data instantly.</p>
        </div>
        <div class="stats" id="statsDisplay">Channels: 0</div>
    </header>

    <div class="controls">
        <label class="file-label" for="fileInput">📁 Load File</label>
        <input type="file" id="fileInput" accept=".m3u,.m3u8">
        <label class="file-label" for="mergeFileInput">➕ Merge File</label>
        <input type="file" id="mergeFileInput" accept=".m3u,.m3u8">

        <input type="text" id="urlInput" placeholder="Paste M3U Link URL...">
        <button id="fetchUrlBtn">🌐 Fetch Link</button>
        <button id="mergeUrlBtn">➕ Merge Link</button>

        <button id="checkBtn" disabled>⚡ Check Status</button>
        <button id="sortBtn" disabled>🔀 Sort A-Z</button>
        <button id="autoSortBtn" disabled>🧭 Auto Sort Groups</button>
        <button id="deleteDuplicatesBtn" disabled>🧹 Delete Duplicates</button>
        <button id="deleteOfflineBtn" disabled>🗑️ Delete Offline</button>
        <button id="deleteGeoblockedBtn" disabled>🚫 Delete Geoblocked</button>
        <select id="categoryOrderSelect" disabled></select>
        <button id="categoryUpBtn" disabled>↑ Category</button>
        <button id="categoryDownBtn" disabled>↓ Category</button>
        
        <select id="categoryFilter" disabled>
            <option value="all">All Categories</option>
        </select>

        <input type="search" id="channelSearchInput" placeholder="Search channels..." disabled>

        <button id="textViewBtn" disabled>📝 Text View</button>
        <button id="exportBtn" style="background-color: var(--success); margin-left: auto;" disabled>💾 Export M3U</button>
    </div>

    <div class="text-editor-panel" id="textEditorPanel">
        <textarea id="m3uTextEditor" spellcheck="false"></textarea>
        <div class="text-editor-actions">
            <span class="text-save-status" id="textSaveStatus"></span>
            <button id="refreshTextBtn" disabled>↻ Refresh Text</button>
            <button id="applyTextBtn" disabled>💾 Save Text</button>
            <button id="closeTextBtn">Close</button>
        </div>
    </div>

    <div class="progress-panel" id="checkProgressPanel">
        <div class="progress-row">
            <span id="checkProgressText">Checking channels...</span>
            <span id="checkProgressPercent">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="checkProgressFill"></div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30px;">#</th>
                    <th style="width: 220px;">Logo URL</th>
                    <th>Channel Name</th>
                    <th>Category Group</th>
                    <th>EPG ID</th>
                    <th>Stream URL</th>
                    <th style="width: 80px;">Status</th>
                    <th style="width: 40px;">Action</th>
                </tr>
            </thead>
            <tbody id="channelTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    let playlistChannels = [];
    let originalOrder = [];

    // Elements
    const fileInput = document.getElementById('fileInput');
    const mergeFileInput = document.getElementById('mergeFileInput');
    const urlInput = document.getElementById('urlInput');
    const fetchUrlBtn = document.getElementById('fetchUrlBtn');
    const mergeUrlBtn = document.getElementById('mergeUrlBtn');
    const checkBtn = document.getElementById('checkBtn');
    const sortBtn = document.getElementById('sortBtn');
    const autoSortBtn = document.getElementById('autoSortBtn');
    const deleteDuplicatesBtn = document.getElementById('deleteDuplicatesBtn');
    const deleteOfflineBtn = document.getElementById('deleteOfflineBtn');
    const deleteGeoblockedBtn = document.getElementById('deleteGeoblockedBtn');
    const categoryOrderSelect = document.getElementById('categoryOrderSelect');
    const categoryUpBtn = document.getElementById('categoryUpBtn');
    const categoryDownBtn = document.getElementById('categoryDownBtn');
    const categoryFilter = document.getElementById('categoryFilter');
    const channelSearchInput = document.getElementById('channelSearchInput');
    const textViewBtn = document.getElementById('textViewBtn');
    const textEditorPanel = document.getElementById('textEditorPanel');
    const m3uTextEditor = document.getElementById('m3uTextEditor');
    const textSaveStatus = document.getElementById('textSaveStatus');
    const refreshTextBtn = document.getElementById('refreshTextBtn');
    const applyTextBtn = document.getElementById('applyTextBtn');
    const closeTextBtn = document.getElementById('closeTextBtn');
    const exportBtn = document.getElementById('exportBtn');
    const tableBody = document.getElementById('channelTableBody');
    const statsDisplay = document.getElementById('statsDisplay');
    const checkProgressPanel = document.getElementById('checkProgressPanel');
    const checkProgressText = document.getElementById('checkProgressText');
    const checkProgressPercent = document.getElementById('checkProgressPercent');
    const checkProgressFill = document.getElementById('checkProgressFill');

    // 1. Process Local M3U File
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => loadData(evt.target.result);
        reader.readAsText(file);
        fileInput.value = '';
    });

    mergeFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => mergeData(evt.target.result);
        reader.readAsText(file);
        mergeFileInput.value = '';
    });

    // 2. Process Remote M3U Link via CORS Proxy
    function normalizePlaylistUrl(url) {
        let cleanUrl = url.trim();
        cleanUrl = cleanUrl.replace('github.com/', 'raw.githubusercontent.com/');
        cleanUrl = cleanUrl.replace('/blob/', '/');
        cleanUrl = cleanUrl.replace('/refs/heads/', '/');
        return cleanUrl;
    }

    async function fetchPlaylistText(url) {
        const cleanUrl = normalizePlaylistUrl(url);
        const urlsToTry = [
            cleanUrl,
            `https://corsproxy.io/?${encodeURIComponent(cleanUrl)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(cleanUrl)}`
        ];

        let lastError = null;
        for (const fetchUrl of urlsToTry) {
            try {
                const response = await fetch(fetchUrl, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.text();
                if (!data.includes('#EXTM3U') && !data.includes('#EXTINF')) {
                    throw new Error('Response was not an M3U playlist');
                }
                return data;
            } catch (err) {
                lastError = err;
            }
        }

        throw lastError || new Error('Unable to fetch playlist');
    }

    fetchUrlBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        if (!url) return alert('Please paste an M3U URL link first.');
        
        fetchUrlBtn.innerText = '⏳ Processing...';
        fetchUrlBtn.disabled = true;
        
        try {
            const data = await fetchPlaylistText(url);
            loadData(data);
        } catch (err) {
            alert(`Failed fetching M3U: ${err.message}`);
        } finally {
            fetchUrlBtn.innerText = '🌐 Fetch Link';
            fetchUrlBtn.disabled = false;
        }
    });

    mergeUrlBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        if (!url) return alert('Please paste an M3U URL link first.');
        
        mergeUrlBtn.innerText = '⏳ Merging...';
        mergeUrlBtn.disabled = true;
        
        try {
            const data = await fetchPlaylistText(url);
            mergeData(data);
        } catch (err) {
            alert(`Failed merging M3U: ${err.message}`);
        } finally {
            mergeUrlBtn.innerText = '➕ Merge Link';
            mergeUrlBtn.disabled = false;
        }
    });

    function loadData(textData) {
        parseM3U(textData);
        originalOrder = [...playlistChannels];
        enableControls();
        populateCategoryOrderSelect();
        populateCategories();
        filterAndRender();
    }

    function mergeData(textData) {
        const beforeCount = playlistChannels.length;
        parseM3U(textData, true);
        originalOrder = [...playlistChannels];
        enableControls();
        populateCategoryOrderSelect();
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Merged playlist with original groups';
        }
        alert(`Merged ${playlistChannels.length - beforeCount} channel${playlistChannels.length - beforeCount === 1 ? '' : 's'} and kept original group names.`);
    }

    function reloadFromText(textData) {
        loadData(textData);
    }

    // 3. Bulletproof Multi-Format Parser
    function parseExtinfAttributes(line) {
        const commaIndex = line.lastIndexOf(',');
        const attrText = commaIndex !== -1 ? line.substring(0, commaIndex) : line;
        const attrs = {};
        const attrOrder = [];
        const attrRegex = /([\w:-]+)="([^"]*)"/g;
        let match;
        while ((match = attrRegex.exec(attrText)) !== null) {
            attrs[match[1]] = match[2];
            attrOrder.push(match[1]);
        }
        return { attrs, attrOrder };
    }

    function parseM3U(data, append = false) {
        const lines = data.split(/\r?\n/);
        if (!append) playlistChannels = [];
        let currentChannel = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            if (line.startsWith('#EXTINF:')) {
                const commaIndex = line.lastIndexOf(',');
                let name = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : 'Unknown Channel';
                const extinfData = parseExtinfAttributes(line);
                
                const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
                let logo = logoMatch ? logoMatch[1] : '';

                const epgMatch = line.match(/tvg-id="([^"]*)"/i);
                let epgId = epgMatch ? epgMatch[1] : '';

                const groupMatch = line.match(/group-title="([^"]*)"/i);
                let group = groupMatch ? groupMatch[1] : 'Uncategorized';

                currentChannel = {
                    name: name,
                    logo: logo,
                    epgId: epgId,
                    group: group,
                    attrs: extinfData.attrs,
                    attrOrder: extinfData.attrOrder,
                    props: [],
                    status: 'unchecked'
                };
            } else if (line.startsWith('http') || line.startsWith('rtmp') || line.startsWith('rtsp')) {
                if (currentChannel) {
                    currentChannel.url = line;
                    playlistChannels.push(currentChannel);
                    currentChannel = null;
                } else {
                    // Handle stray URLs without parent #EXTINF lines safely
                    playlistChannels.push({
                        name: line.split('/').pop() || 'Untitled Stream',
                        logo: '',
                        epgId: '',
                        group: 'Uncategorized',
                        attrs: {},
                        attrOrder: [],
                        props: [],
                        url: line,
                        status: 'unchecked'
                    });
                }
            } else if (currentChannel && line.startsWith('#')) {
                currentChannel.props.push(line);
            }
        }
        originalOrder = [...playlistChannels];
        updateStats();
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function customPlaylistGroups() {
        return [...new Set(playlistChannels
            .map(ch => String(ch.group || '').trim())
            .filter(group => group && !autoCategoryOrder.includes(group)))]
            .sort((a, b) => a.localeCompare(b));
    }

    function getGroupOptions(currentGroup) {
        const groups = [...autoCategoryOrder, ...customPlaylistGroups()];
        const cleanCurrentGroup = String(currentGroup || '').trim();
        if (cleanCurrentGroup && !groups.includes(cleanCurrentGroup)) groups.push(cleanCurrentGroup);
        return groups;
    }

    // 4. Render Layout
    function renderTable(channels) {
        tableBody.innerHTML = '';
        channels.forEach((ch, idx) => {
            const channelIndex = playlistChannels.indexOf(ch);
            const groupOptions = getGroupOptions(ch.group);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color: #64748b;">${idx + 1}</td>
                <td>
                    <div class="logo-editor">
                        <img class="channel-logo" src="${escapeHtml(ch.logo || '')}" onerror="this.style.display='none'">
                        <input class="logo-input" type="text" value="${escapeHtml(ch.logo || '')}" oninput="this.previousElementSibling.src = this.value; this.previousElementSibling.style.display = this.value ? '' : 'none';" onblur="updateField(${channelIndex}, 'logo', this.value)">
                    </div>
                </td>
                <td><div class="editable" contenteditable="true" onblur="updateField(${channelIndex}, 'name', this.innerText)">${ch.name}</div></td>
                <td>
                    <select class="group-select" onchange="updateField(${channelIndex}, 'group', this.value)">
                        ${groupOptions.map(group => `<option value="${escapeHtml(group)}" ${group === ch.group ? 'selected' : ''}>${escapeHtml(group)}</option>`).join('')}
                    </select>
                </td>
                <td><input class="epg-input" type="text" value="${escapeHtml(ch.epgId || '')}" onblur="updateField(${channelIndex}, 'epgId', this.value)"></td>
                <td><div class="editable" contenteditable="true" onblur="updateField(${channelIndex}, 'url', this.innerText)">${ch.url}</div></td>
                <td><span class="status-badge status-${ch.status}" id="status-${channelIndex}">${statusLabel(ch.status)}</span></td>
                <td><button class="btn-danger" onclick="deleteChannel(${channelIndex})">🗑️</button></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    // 5. Modifications Management
    window.updateField = function(index, field, value) {
        const cleanValue = value.trim();
        playlistChannels[index][field] = field === 'group' && !getGroupOptions(playlistChannels[index]?.group).includes(cleanValue)
            ? 'Entertainment'
            : cleanValue;
        if (field === 'group') {
            sortByCategoryOrder();
            isSorted = false;
            sortBtn.innerText = '🔀 Sort A-Z';
            populateCategories();
            filterAndRender();
        }
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Text updated from table';
        }
    };

    window.deleteChannel = function(index) {
        playlistChannels.splice(index, 1);
        updateStats();
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Text updated from table';
        }
    };

    function duplicateStreamKey(url) {
        const cleanUrl = String(url || '').trim();
        const pathOnly = cleanUrl.split(/[?#]/)[0].toLowerCase();
        if (!/\.(mpd|m3u8|ts)$/.test(pathOnly)) return '';
        return cleanUrl.toLowerCase();
    }

    function hasEpgId(channel) {
        return Boolean(String(channel?.epgId || channel?.attrs?.['tvg-id'] || '').trim());
    }

    deleteDuplicatesBtn.addEventListener('click', () => {
        const keeperByKey = new Map();
        let removedCount = 0;

        playlistChannels.forEach(ch => {
            const key = duplicateStreamKey(ch.url);
            if (!key) return;
            const currentKeeper = keeperByKey.get(key);
            if (!currentKeeper || (!hasEpgId(currentKeeper) && hasEpgId(ch))) {
                keeperByKey.set(key, ch);
            }
        });

        playlistChannels = playlistChannels.filter(ch => {
            const key = duplicateStreamKey(ch.url);
            if (!key) return true;
            if (keeperByKey.get(key) !== ch) {
                removedCount++;
                return false;
            }
            return true;
        });

        originalOrder = [...playlistChannels];
        updateStats();
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Duplicates removed from table';
        }
        alert(`Removed ${removedCount} duplicate stream URL${removedCount === 1 ? '' : 's'}. Kept duplicates with tvg-id when available.`);
    });

    deleteOfflineBtn.addEventListener('click', () => {
        const beforeCount = playlistChannels.length;
        playlistChannels = playlistChannels.filter(ch => ch.status !== 'offline');
        const removedCount = beforeCount - playlistChannels.length;

        originalOrder = [...playlistChannels];
        updateStats();
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Offline channels removed from table';
        }
        alert(`Removed ${removedCount} offline channel${removedCount === 1 ? '' : 's'}.`);
    });

    deleteGeoblockedBtn.addEventListener('click', () => {
        const beforeCount = playlistChannels.length;
        playlistChannels = playlistChannels.filter(ch => ch.status !== 'geoblocked');
        const removedCount = beforeCount - playlistChannels.length;

        originalOrder = [...playlistChannels];
        updateStats();
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Geoblocked channels removed from table';
        }
        alert(`Removed ${removedCount} geoblocked channel${removedCount === 1 ? '' : 's'}.`);
    });

    // 6. Network Stream Validator
    function streamExtension(url) {
        const pathOnly = String(url || '').trim().split(/[?#]/)[0].toLowerCase();
        const match = pathOnly.match(/\.([a-z0-9]+)$/);
        return match ? match[1] : '';
    }

    function statusLabel(status) {
        if (status === 'geoblocked') return 'GEOBLOCK';
        return String(status || 'unchecked').toUpperCase();
    }

    function looksLikeGeoBlockedPage(text) {
        const sample = String(text || '').slice(0, 5000).toLowerCase();
        return sample.includes('geo-block') ||
            sample.includes('geoblock') ||
            sample.includes('geo restricted') ||
            sample.includes('geo-restricted') ||
            sample.includes('geo restriction') ||
            sample.includes('geographical restriction') ||
            sample.includes('not available in your country') ||
            sample.includes('not available in this country') ||
            sample.includes('not available in your region') ||
            sample.includes('not available in this region') ||
            sample.includes('not available in your location') ||
            sample.includes('outside of your territory') ||
            sample.includes('outside your territory') ||
            sample.includes('country is not allowed') ||
            sample.includes('region is not allowed') ||
            sample.includes('blocked in your country') ||
            sample.includes('blocked in your region') ||
            sample.includes('access from your country') ||
            sample.includes('restricted in your country') ||
            sample.includes('restricted in your region') ||
            sample.includes('due to rights restrictions') ||
            sample.includes('content is not available') ||
            sample.includes('content unavailable in your area');
    }

    function responseLooksGeoblocked(response, bodyText) {
        if (!response || response.type === 'opaque') return false;
        if (response.status === 451) return true;
        if (response.status === 403) return true;
        if (response.status === 401 && looksLikeGeoBlockedPage(bodyText)) return true;
        return looksLikeGeoBlockedPage(bodyText);
    }

    function looksLikeBlockedPage(text) {
        const sample = String(text || '').slice(0, 4000).toLowerCase();
        return sample.includes('<html') ||
            sample.includes('<!doctype') ||
            sample.includes('access denied') ||
            sample.includes('forbidden') ||
            sample.includes('not available') ||
            sample.includes('unavailable') ||
            sample.includes('geo') ||
            sample.includes('blocked') ||
            sample.includes('not authorized') ||
            sample.includes('token expired');
    }

    function streamCheckUrls(url) {
        return [
            url,
            `https://corsproxy.io/?${encodeURIComponent(url)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        ];
    }

    function resolveStreamUrl(baseUrl, maybeRelativeUrl) {
        try {
            return new URL(String(maybeRelativeUrl || '').trim(), baseUrl).href;
        } catch (err) {
            return '';
        }
    }

    function hlsUriFromTag(line) {
        const match = String(line || '').match(/URI=(?:"([^"]+)"|([^,\s]+))/i);
        return match ? (match[1] || match[2] || '').trim() : '';
    }

    function firstHlsUrls(manifestText, manifestUrl) {
        const lines = String(manifestText || '').split(/\r?\n/).map(line => line.trim()).filter(Boolean);
        const urls = [];

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (/^#EXT-X-(STREAM-INF|I-FRAME-STREAM-INF):/i.test(line)) {
                const inlineUri = hlsUriFromTag(line);
                if (inlineUri) urls.push(resolveStreamUrl(manifestUrl, inlineUri));
                for (let j = i + 1; j < lines.length; j++) {
                    if (!lines[j].startsWith('#')) {
                        urls.push(resolveStreamUrl(manifestUrl, lines[j]));
                        break;
                    }
                }
            }
        }

        lines.forEach(line => {
            if (!line.startsWith('#') && !line.toLowerCase().startsWith('data:')) {
                urls.push(resolveStreamUrl(manifestUrl, line));
            }
        });

        return [...new Set(urls.filter(Boolean))].slice(0, 3);
    }

    function hlsTagUrls(manifestText, manifestUrl, tagName) {
        return String(manifestText || '')
            .split(/\r?\n/)
            .map(line => line.trim())
            .filter(line => line.toUpperCase().startsWith(`#EXT-X-${tagName}:`))
            .map(hlsUriFromTag)
            .filter(uri => uri && !uri.toLowerCase().startsWith('data:'))
            .map(uri => resolveStreamUrl(manifestUrl, uri))
            .filter(Boolean);
    }

    async function fetchStreamText(url, timeoutMs = 9000) {
        let sawGeoBlock = false;
        for (const checkUrl of streamCheckUrls(url)) {
            try {
                const response = await fetchWithTimeout(checkUrl, { method: 'GET' }, timeoutMs);
                const bodyText = await response.text();
                if (responseLooksGeoblocked(response, bodyText)) sawGeoBlock = true;
                if (response.ok && response.type !== 'opaque' && !looksLikeBlockedPage(bodyText)) {
                    return { status: 'online', response, bodyText };
                }
            } catch (err) {
                // Try the next strategy.
            }
        }
        return { status: sawGeoBlock ? 'geoblocked' : 'offline', response: null, bodyText: '' };
    }

    async function checkMediaSegmentUrl(url) {
        let sawGeoBlock = false;
        for (const checkUrl of streamCheckUrls(url)) {
            try {
                const response = await fetchWithTimeout(checkUrl, {
                    method: 'GET',
                    headers: { Range: 'bytes=0-4095' }
                }, 9000);
                const contentType = (response.headers.get('content-type') || '').toLowerCase();
                const bodyText = await response.text();
                if (responseLooksGeoblocked(response, bodyText)) sawGeoBlock = true;
                if (!response.ok || response.type === 'opaque' || looksLikeBlockedPage(bodyText)) continue;
                if (contentType.includes('text/html') || contentType.includes('application/json') || contentType.includes('text/plain')) continue;
                if (contentType.includes('video') || contentType.includes('audio') || contentType.includes('octet-stream') || contentType.includes('mp4') || contentType.includes('mpeg') || bodyText.length > 1000) {
                    return 'online';
                }
            } catch (err) {
                // Try the next strategy.
            }
        }
        return sawGeoBlock ? 'geoblocked' : 'offline';
    }

    async function validateHlsPlayback(manifestUrl, manifestText, depth = 0) {
        const text = String(manifestText || '').trim();
        if (!text.includes('#EXTM3U') || !/#EXT-X-(STREAM-INF|TARGETDURATION|MEDIA-SEQUENCE|INF|MEDIA|MAP):/i.test(text) || looksLikeBlockedPage(text)) {
            return 'offline';
        }
        if (depth > 2) return 'offline';

        const requiredSideUrls = [
            ...hlsTagUrls(text, manifestUrl, 'KEY'),
            ...hlsTagUrls(text, manifestUrl, 'MAP')
        ];
        for (const sideUrl of [...new Set(requiredSideUrls)]) {
            const sideStatus = await checkMediaSegmentUrl(sideUrl);
            if (sideStatus !== 'online') return sideStatus;
        }

        const urls = firstHlsUrls(text, manifestUrl);
        if (!urls.length) return 'offline';

        for (const nextUrl of urls) {
            if (streamExtension(nextUrl) === 'm3u8' || /#EXT-X-STREAM-INF:/i.test(text)) {
                const nextManifest = await fetchStreamText(nextUrl);
                if (nextManifest.status !== 'online') return nextManifest.status;
                const nestedStatus = await validateHlsPlayback(nextUrl, nextManifest.bodyText, depth + 1);
                if (nestedStatus === 'online') return 'online';
                if (nestedStatus === 'geoblocked') return 'geoblocked';
                continue;
            }

            const segmentStatus = await checkMediaSegmentUrl(nextUrl);
            if (segmentStatus === 'online') return 'online';
            if (segmentStatus === 'geoblocked') return 'geoblocked';
        }

        return 'offline';
    }

    function isValidStreamResponse(url, response, bodyText) {
        if (!response.ok || response.type === 'opaque') return false;

        const ext = streamExtension(url);
        const contentType = (response.headers.get('content-type') || '').toLowerCase();
        const text = String(bodyText || '').trim();
        if (looksLikeBlockedPage(text)) return false;

        if (ext === 'm3u8') {
            return text.includes('#EXTM3U') &&
                /#EXT-X-(STREAM-INF|TARGETDURATION|MEDIA-SEQUENCE|INF|MEDIA):/i.test(text);
        }

        if (ext === 'mpd') {
            return /<MPD[\s>]/i.test(text) &&
                /<(Period|AdaptationSet|Representation|BaseURL|SegmentTemplate)[\s>]/i.test(text);
        }

        if (ext === 'ts') {
            return !contentType.includes('text/html') &&
                !contentType.includes('application/json') &&
                !contentType.includes('text/plain') &&
                (contentType.includes('video') || contentType.includes('octet-stream') || bodyText.length > 1000);
        }

        return contentType.includes('video') || contentType.includes('mpegurl') || contentType.includes('dash+xml');
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 9000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { ...options, signal: controller.signal, cache: 'no-store' });
        } finally {
            clearTimeout(timeoutId);
        }
    }

    async function checkStreamUrl(url) {
        const cleanUrl = url.trim();
        if (!cleanUrl) return 'offline';
        let sawGeoBlock = false;

        for (const checkUrl of streamCheckUrls(cleanUrl)) {
            try {
                const response = await fetchWithTimeout(checkUrl, {
                    method: 'GET',
                    headers: streamExtension(cleanUrl) === 'ts' ? { Range: 'bytes=0-4095' } : {}
                });
                const bodyText = await response.text();
                if (responseLooksGeoblocked(response, bodyText)) sawGeoBlock = true;
                if (streamExtension(cleanUrl) === 'm3u8') {
                    const hlsStatus = await validateHlsPlayback(cleanUrl, bodyText);
                    if (hlsStatus === 'online') return 'online';
                    if (hlsStatus === 'geoblocked') sawGeoBlock = true;
                    continue;
                }
                if (isValidStreamResponse(cleanUrl, response, bodyText)) return 'online';
            } catch (err) {
                // Try the next strategy. A strict check should fail closed.
            }
        }

        return sawGeoBlock ? 'geoblocked' : 'offline';
    }

    function updateCheckProgress(completed, total) {
        const percent = total ? Math.round((completed / total) * 100) : 0;
        checkProgressPanel.classList.add('active');
        checkProgressText.innerText = `Checking channels ${completed}/${total}`;
        checkProgressPercent.innerText = `${percent}%`;
        checkProgressFill.style.width = `${percent}%`;
    }

    checkBtn.addEventListener('click', async () => {
        if (!playlistChannels.length) return;
        checkBtn.disabled = true;
        checkBtn.innerText = '⏳ Checking...';
        const channelsToCheck = [...playlistChannels];
        const totalChannels = channelsToCheck.length;
        updateCheckProgress(0, totalChannels);

        const concurrency = 12;
        let nextIndex = 0;
        let completed = 0;

        async function checkOneChannel(index) {
            const channel = channelsToCheck[index];
            const currentIndex = playlistChannels.indexOf(channel);
            const badge = currentIndex !== -1 ? document.getElementById(`status-${currentIndex}`) : null;
            if (badge) badge.innerText = 'TRYING';
            try {
                channel.status = await checkStreamUrl(channel.url);
            } catch (err) {
                channel.status = 'offline';
            }
            if (badge) {
                badge.className = `status-badge status-${channel.status}`;
                badge.innerText = statusLabel(channel.status);
            }
            updateStats();
            completed++;
            checkBtn.innerText = `⏳ Checking ${completed}/${totalChannels}`;
            updateCheckProgress(completed, totalChannels);
        }

        async function worker() {
            while (nextIndex < totalChannels) {
                const index = nextIndex++;
                await checkOneChannel(index);
            }
        }

        const workerCount = Math.min(concurrency, totalChannels);
        await Promise.all(Array.from({ length: workerCount }, worker));

        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Statuses updated from check';
        }
        checkBtn.disabled = false;
        checkBtn.innerText = '⚡ Check Status';
        updateCheckProgress(totalChannels, totalChannels);
        setTimeout(() => checkProgressPanel.classList.remove('active'), 1200);
    });

    // 7. Sort Engines
    let isSorted = false;
    sortBtn.addEventListener('click', () => {
        if (!isSorted) {
            playlistChannels.sort((a, b) => a.name.localeCompare(b.name));
            sortBtn.innerText = '🔄 Reset Order';
        } else {
            playlistChannels = [...originalOrder];
            sortBtn.innerText = '🔀 Sort A-Z';
        }
        isSorted = !isSorted;
        filterAndRender();
    });

    let autoCategoryOrder = ['Movies', 'News', 'Philippines', 'Entertainment', 'Sports', 'Documentary', 'Kids'];
    const autoCategoryRules = [
        {
            group: 'Philippines',
            terms: [
                'philippines', 'philippine', 'pinoy', 'filipino', 'tagalog', 'kapamilya', 'kapuso',
                'gma', 'gma network', 'gma main channel', 'gtv', 'heart of asia', 'i heart movies', 'hallypop', 'pinoy hits',
                'tv5', 'cignal', 'rptv', 'one ph', 'one news ph', 'one sports',
                'abs-cbn', 'abs cbn', 'a2z', 'a2z channel 11', 'alltv', 'alltv channel 2',
                'ptv', 'people television network', 'congress tv', 'ptv sports', 'radyo pilipinas', 'radyo pilipinas 1', 'ibc', 'ibc 13',
                'beam tv', 'prtv', 'prtv prime media', 'blast sports', 'knowledge channel', 'bilyonaryo', 'bilyonaryo news',
                'solarflix', 'solar sports', 'shop tv',
                'net 25', 'aliw', 'aliw channel', 'dwiz', 'dwiz news tv', 'eagle broadcasting',
                'inc tv', 'untv', 'truth channel', 'light tv', 'hope channel philippines', 'tv maria',
                'rj digitv', 'rjtv29', 'rj tv 29', 'timeless tv', 'rock mnl', 'rock tv of manila', 'smni',
                'anc', 'teleradyo', 'tele radyo', 'dzbb', 'dzrh', 'dzmm', 'cnn philippines',
                'buko', 'cinemo', 'cinema one', 'pbo', 'pinoy box office', 'viva cinema', 'viva tv', 'sari sari', 'sari-sari', 'jeepney tv',
                'myx philippines', 'myx global', 'radio maria', 'ptv4', 'ptv 4', 'oras ng himala', 'mindanow network',
                'metro channel', 'gnn', 'filam tv', 'cltv36', 'cltv 36', 'pba', 'uaap'
            ]
        },
        { group: 'Movies', terms: ['movie', 'movies', 'cinema', 'film', 'hbo', 'cinemax', 'fox movies', 'thrill', 'hits', 'screen'] },
        { group: 'News', terms: ['news', 'cnn', 'bbc', 'cnbc', 'bloomberg', 'al jazeera', 'fox news'] },
        { group: 'Entertainment', terms: ['entertainment', 'variety', 'lifestyle', 'music', 'mtv', 'myx', 'viva', 'comedy', 'drama', 'series', 'reality'] },
        { group: 'Sports', terms: ['sports', 'sport', 'nba', 'nfl', 'mlb', 'ufc', 'wwe', 'boxing', 'fight', 'espn', 'bein', 'premier', 'football', 'soccer', 'tennis', 'golf'] },
        { group: 'Documentary', terms: ['documentary', 'docs', 'history', 'discovery', 'nat geo', 'national geographic', 'animal planet', 'science', 'knowledge'] },
        { group: 'Kids', terms: ['kids', 'kid', 'cartoon', 'nick', 'nickelodeon', 'disney', 'boomerang', 'baby', 'junior', 'pbs kids'] }
    ];

    function normalizeWords(value) {
        return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    }

    function compactWords(value) {
        return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
    }

    function termMatchScore(text, term, fieldWeight = 1) {
        const normalizedText = normalizeWords(text);
        const normalizedTerm = normalizeWords(term);
        if (!normalizedTerm) return 0;

        const paddedText = ` ${normalizedText} `;
        const paddedTerm = ` ${normalizedTerm} `;
        const wordCount = normalizedTerm.split(/\s+/).filter(Boolean).length;
        const specificity = Math.min(30, normalizedTerm.length) + (wordCount * 6);

        if (normalizedText === normalizedTerm) return (140 + specificity) * fieldWeight;
        if (paddedText.includes(paddedTerm)) return (35 + specificity) * fieldWeight;

        const compactText = compactWords(text);
        const compactTerm = compactWords(term);
        if (compactTerm.length >= 6 && compactText.includes(compactTerm)) {
            return (18 + Math.min(18, compactTerm.length)) * fieldWeight;
        }

        return 0;
    }

    function categoryScore(channel, rule) {
        const fields = [
            { text: channel.name, weight: 1.35 },
            { text: channel.group, weight: 0.85 },
            { text: channel.epgId, weight: 0.75 },
            { text: channel.url, weight: 0.35 },
            { text: channel.logo, weight: 0.25 }
        ];

        let score = 0;
        rule.terms.forEach(term => {
            fields.forEach(field => {
                score += termMatchScore(field.text, term, field.weight);
            });
        });

        const existingGroup = normalizeWords(channel.group);
        if (existingGroup === normalizeWords(rule.group)) score += 45;
        return score;
    }

    function normalizeAutoCategory(channel) {
        const scoredRules = autoCategoryRules
            .map(rule => ({ group: rule.group, score: categoryScore(channel, rule) }))
            .sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return autoCategoryRank(a.group) - autoCategoryRank(b.group);
            });

        if (scoredRules[0] && scoredRules[0].score >= 45) return scoredRules[0].group;

        const existingGroup = autoCategoryOrder.find(group => normalizeWords(channel.group) === normalizeWords(group));
        return existingGroup || 'Entertainment';
    }

    function normalizePlaylistGroups() {
        playlistChannels.forEach(ch => {
            ch.group = normalizeAutoCategory(ch);
        });
        sortByCategoryOrder();
        originalOrder = [...playlistChannels];
    }

    function autoCategoryRank(group) {
        const rank = autoCategoryOrder.indexOf(group);
        return rank === -1 ? autoCategoryOrder.length : rank;
    }

    function sortByCategoryOrder() {
        playlistChannels.sort((a, b) => {
            const rankDiff = autoCategoryRank(a.group) - autoCategoryRank(b.group);
            if (rankDiff !== 0) return rankDiff;
            return a.name.localeCompare(b.name);
        });
    }

    function populateCategoryOrderSelect() {
        const currentSelection = categoryOrderSelect.value || autoCategoryOrder[0];
        categoryOrderSelect.innerHTML = '';
        autoCategoryOrder.forEach((category, index) => {
            const opt = document.createElement('option');
            opt.value = category;
            opt.innerText = `${index + 1}. ${category}`;
            categoryOrderSelect.appendChild(opt);
        });
        categoryOrderSelect.value = autoCategoryOrder.includes(currentSelection) ? currentSelection : autoCategoryOrder[0];
    }

    function moveSelectedCategory(direction) {
        const selectedCategory = categoryOrderSelect.value;
        const currentIndex = autoCategoryOrder.indexOf(selectedCategory);
        const nextIndex = currentIndex + direction;
        if (currentIndex === -1 || nextIndex < 0 || nextIndex >= autoCategoryOrder.length) return;

        [autoCategoryOrder[currentIndex], autoCategoryOrder[nextIndex]] = [autoCategoryOrder[nextIndex], autoCategoryOrder[currentIndex]];
        sortByCategoryOrder();
        isSorted = false;
        sortBtn.innerText = '🔀 Sort A-Z';
        populateCategoryOrderSelect();
        categoryOrderSelect.value = selectedCategory;
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Text updated from table';
        }
    }

    categoryUpBtn.addEventListener('click', () => moveSelectedCategory(-1));
    categoryDownBtn.addEventListener('click', () => moveSelectedCategory(1));

    autoSortBtn.addEventListener('click', () => {
        playlistChannels.forEach(ch => {
            ch.group = normalizeAutoCategory(ch);
        });

        sortByCategoryOrder();

        isSorted = false;
        sortBtn.innerText = '🔀 Sort A-Z';
        categoryFilter.value = 'all';
        populateCategories();
        filterAndRender();
        if (textEditorPanel.classList.contains('active')) {
            m3uTextEditor.value = buildM3UContent();
            textSaveStatus.innerText = 'Text updated from table';
        }
    });

    // 8. Auto Category Sorting Filters
    function populateCategories() {
        const currentSelection = categoryFilter.value;
        const categories = getGroupOptions();
        categoryFilter.innerHTML = '<option value="all">All Categories</option>';
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.innerText = cat;
            categoryFilter.appendChild(opt);
        });
        categoryFilter.value = currentSelection === 'all' || categories.includes(currentSelection) ? currentSelection : 'all';
    }

    categoryFilter.addEventListener('change', filterAndRender);
    channelSearchInput.addEventListener('input', filterAndRender);

    function filterAndRender() {
        const selectedCat = categoryFilter.value;
        const query = channelSearchInput.value.trim().toLowerCase();
        const filtered = playlistChannels.filter(ch => {
            const inCategory = selectedCat === 'all' || ch.group === selectedCat;
            if (!inCategory) return false;
            if (!query) return true;
            const searchableText = [
                ch.name,
                ch.group,
                ch.url,
                ch.epgId,
                ch.logo,
                ch.status,
                ...(ch.props || [])
            ].join(' ').toLowerCase();
            return searchableText.includes(query);
        });
        renderTable(filtered);
    }

    // 9. Structured Exporter
    function escapeM3UAttribute(value) {
        return String(value || '').replace(/"/g, '&quot;');
    }

    function buildExtinfLine(ch) {
        const attrs = {
            ...(ch.attrs || {}),
            'tvg-id': ch.epgId || '',
            'tvg-logo': ch.logo || '',
            'group-title': ch.group || 'Entertainment'
        };
        const attrOrder = [...(ch.attrOrder || [])];
        ['tvg-id', 'tvg-logo', 'group-title'].forEach(attr => {
            if (!attrOrder.includes(attr)) attrOrder.push(attr);
        });
        const attrText = attrOrder
            .filter(attr => attrs[attr] !== undefined)
            .map(attr => `${attr}="${escapeM3UAttribute(attrs[attr])}"`)
            .join(' ');
        return `#EXTINF:-1 ${attrText},${ch.name}`;
    }

    function buildM3UContent() {
        let m3uContent = "#EXTM3U\n";
        playlistChannels.forEach(ch => {
            const propLines = (ch.props || []).length ? `${ch.props.join('\n')}\n` : '';
            m3uContent += `${buildExtinfLine(ch)}\n${propLines}${ch.url}\n\n`;
        });
        return m3uContent;
    }

    textViewBtn.addEventListener('click', () => {
        m3uTextEditor.value = buildM3UContent();
        textSaveStatus.innerText = 'Text matches table';
        textEditorPanel.classList.add('active');
    });

    m3uTextEditor.addEventListener('input', () => {
        textSaveStatus.innerText = 'Unsaved text changes';
    });

    refreshTextBtn.addEventListener('click', () => {
        m3uTextEditor.value = buildM3UContent();
        textSaveStatus.innerText = 'Text refreshed from table';
    });

    applyTextBtn.addEventListener('click', () => {
        const editedText = m3uTextEditor.value.trim();
        if (!editedText) return alert('Text editor is empty.');
        reloadFromText(editedText);
        m3uTextEditor.value = buildM3UContent();
        textSaveStatus.innerText = 'Saved to table';
    });

    closeTextBtn.addEventListener('click', () => {
        textEditorPanel.classList.remove('active');
    });

    exportBtn.addEventListener('click', () => {
        const m3uContent = buildM3UContent();
        const blob = new Blob([m3uContent], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'clean_playlist.m3u';
        a.click();
    });

    function enableControls() {
        checkBtn.disabled = false; sortBtn.disabled = false; autoSortBtn.disabled = false; deleteDuplicatesBtn.disabled = false; deleteOfflineBtn.disabled = false; deleteGeoblockedBtn.disabled = false;
        categoryOrderSelect.disabled = false; categoryUpBtn.disabled = false; categoryDownBtn.disabled = false;
        categoryFilter.disabled = false; channelSearchInput.disabled = false; textViewBtn.disabled = false; refreshTextBtn.disabled = false; applyTextBtn.disabled = false; exportBtn.disabled = false;
    }

    function updateStats() {
        const statusCounts = playlistChannels.reduce((counts, ch) => {
            const status = ch.status || 'unchecked';
            counts[status] = (counts[status] || 0) + 1;
            return counts;
        }, {});
        statsDisplay.innerText = `Channels: ${playlistChannels.length} | Online: ${statusCounts.online || 0} | Offline: ${statusCounts.offline || 0} | Geoblocked: ${statusCounts.geoblocked || 0} | Unchecked: ${statusCounts.unchecked || 0}`;
    }

    populateCategoryOrderSelect();
